body:
  text: 海岱㑹集卷九五言排律登廣固舊城懷古陳經下馬尋孤壘登髙俯舊城龍岡盤地險雉堞與雲平東望滄溟㑹西瞻泰嶽迎四山屏亂立一澗帶相縈十二侔秦郡膏腴擬漢京封疆仍晉服巡狩尚堯名蔚蔚林臯接油油禾黍成斷崖蒼蘚合絶壁紫烟橫野鹿驚人過村雞出樹鳴川陵互變易冠蓋幾枯榮闤闠夷丘隴人家伴牧耕霸圖何寂寞凄惻不勝情七夕日㑹集隱山方丈海亭酒味缺佳酤以代之馮裕上界三天外嘉辰七夕秋瑞光凝漢渚靈匹㑹牽牛白帝新涼入清髙舊暑收尊携江夏酒話共逺公逰社擬開蓮集杯疑渡海浮座中聨俊彥方外得清幽誦偈猿求聽談經鬼亦愁鴨罏騰紫篆龍鉢注黃流不見齊從事翻逢魯督郵既興歡伯歎復重麴生憂瓶榼深䝉恥茶瓜亦起羞目懸張掖使吻渴醉鄉侯村舍金魚換山門玉帶留雲安春可贖桑落逺堪謀緑蟻分壚畔青蚨解杖頭洗厨重辦饋移席更相酬院竹飄竽籟曇花送酒籌曠懷傾北海髙義重南州雲水超真悟乾坤豁醉眸家雞輸野雉座客漫夷猶人日逢春劉澄甫七日人皆得三陽氣始新縷金傳舊俗盤菜送比鄰暮景逢晴旦幽居喜正晨薄寒疑嶙峭輕暖透逡巡柏葉消殘雪蘆灰起細塵梅粧還貴艷柑釀逐清貧陟覺天時泰俄瞻地脉伸名花紅翦勝柔草緑抽茵餅餌甘粗糲衣冠愧縉紳仙樓春縹眇漢殿晝嶙峋朝謁希疏出羅幡賜豫頻條風紆禁籞冰凍暗江津北海多岑寂東郊接隱淪琴香誰逸興嵗月此閒身早起勤為拙宵眠懶近真青山開化育白屋掩柴筠杜老愁須破坡翁意自親雲翹翻袖舞彩帳揭華闉嘯傲牛呼馬招搖斗指寅年年讀書舍應共太平民送陳東渚北上五鳯司喉舌三齊表縉紳銀臺仍管鑰畫省舊臣鄰日近彤樓影香飄紫閣塵斗邊黃紙下山畔白雲屯閥閲移忠孝交親盡主賔松筠堅氣節冰雪飽精神暫得襜帷駐行當要路津何妨隱金馬正值走蒲輪青鎖經逰慣黃扉出納頻龍墀通密勿楓陛聽絲綸接武䕫龍踵分憂丙魏身衮衣明日月錫服繡麒麟豈望彈冠慶還瞻結綬新忝豫白髮友羡爾紫薇臣蓮社盟猶在雞壇誼已伸琴香消暑酷金石托情真乘醉吟花下投閒釣水濵風烟重離别書札慰沉淪海岱㑹集卷九
