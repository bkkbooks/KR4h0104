body:
  text: 海岱㑹集巻九五言排律登廣固舊城懐古陳經下馬尋孤壘登髙俯舊城龍岡盤地險雉堞與雲平東望滄溟㑹西瞻泰嶽迎四山屏亂立一澗帶相縈十二侔秦郡膏腴儗漢京封疆仍晉服巡狩尚堯名蔚蔚林臯接油油禾黍成斷崖蒼蘚合絶壁紫烟横野鹿驚人過村鷄出樹鳴川陵互變易冠葢幾枯榮闤闠夷丘隴人家伴牧耕霸圖何寂寞凄惻不勝情七夕日㑹集隠山方丈海亭酒味欠佳酤以代之馮裕上界三天外嘉辰七夕秋瑞光凝漢渚靈匹㑹牽牛白帝新涼入清髙舊暑収尊携江夏酒話共逺公逰社擬開蓮集杯疑渡海浮座中聨俊彦方外得清幽誦偈猿求聽談經鬼亦愁鴨罏騰紫篆龍鉢注黄流不見齊從事翻逢魯督郵既興歡伯歎復重麹生憂缾榼深䝉恥茶瓜亦起羞目懸張掖使吻渇醉鄉侯村舍金魚換山門玉帶留雲安春可贖桑落逺堪謀緑螘分壚畔青蚨觧杖頭洗厨重辦饋移席更相酬院竹飄竽籟曇花送酒籌曠懐傾北海髙義重南州雲水超真悟乾坤豁醉眸家鷄輸野雉座客漫夷猶人日逢春劉澄甫七日人皆得三陽氣始新縷金傳舊俗盤菜送比鄰暮景逢晴旦幽居喜正晨薄寒疑嶙峭輕煖透逡巡栢葉消殘雪蘆灰起細塵梅粧還貴艶柑釀逐清貧陟覺天時泰俄瞻地脉伸名花紅翦勝柔草緑抽茵餅餌甘粗糲衣冠媿縉紳仙樓春縹緲漢殿晝嶙峋朝謁希疎出羅幡賜予頻條風紆禁籞冰凍暗江津北海多岑寂東郊接隠淪琴香誰逸興嵗月此閒身早起勤為拙宵眠懶近真青山開化育白屋掩柴筠杜老愁須破坡翁意自親雲翹翻袖舞彩帳掲華闉嘯傲牛呼馬招揺斗指寅年年讀書舍應共太平民送陳東渚北上五鳯司喉舌三齊表縉紳銀臺仍筦鑰畫省舊臣鄰日近彤樓影香飄紫閣塵斗邊黄紙下山畔白雲屯閥閲移忠孝交親盡主賔松筠堅氣節冰雪飽精神暫得襜帷駐行當要路津何妨隐金馬正值走蒲輪青鎖經逰慣黄扉出納頻龍墀通宻勿楓陛聽絲綸接武䕫龍踵分憂丙魏身衮衣明日月錫服繡麒麟豈望彈冠慶還瞻結綬新忝予白髪友羡爾紫薇臣蓮社盟猶在鷄壇誼已伸琴香消暑酷金石托情真乘醉吟花下投閒釣水濵風烟重離别書札慰沉淪海岱㑹集巻九
