body:
  text: 海岱㑹集巻十二七言絶句早梅黄卿香飄瓊蕚一時新斜月溶溶雪夜春若向花中較風節祗應箕潁伴髙人栁枝詞罩水如烟萬葉重倚風飛絮曉茸茸莫教吹落長河去化作浮萍無定踪又畫簾風動影絲絲曳緑揺金晝景遲睡起倚闌看蛺蝶鶯聲只在最髙枝前題馮裕溪栁青青拂碧空小舟一棹曙烟空楊花陣陣西飛去黄鳥聲聲似夢中又栁溪隂裡亂鳴蜩載酒相過坐石橋日暮青山歸鳥盡主人倚柱漫吹簫又陌上楊栁碧參差江上蘭橈倚暮時長歌觧䌫不知處月冷烟空愁夢思又楊花冉冉遂征鞍旌斾悠悠去不還一夜香魂化飛絮随風萬里到長安又嫩葉柔條媚早春朱顔青鬢更相親年年條葉從攀折飛絮飄飄不近人前題黄卿園榭依依烟靄垂習腰纔熟較新眉多情枝上金衣鳥啼到朱簾欲夕時又欲比新楊笑臉開聞歌折栁罷金杯芰荷堤上常如簇移向長亭亭下栽前題劉淵甫御水河堤見栁條退黄添緑媚仍嬌自言態度渾相似不信君王惱細腰牧牛石存禮牧牛何心相牛經只愛年年草色青向晚不知春雨濕東風吹笠過西坰醉樵歌寒山影裡唱歌頻短服長鑱自析薪市入蘭陵惟換酒醉歸翻笑獨醒人冬笋陳經犢角嶄嶄入饌珍嚴冬頗訝發生新龍孫地底通幽蟄隔嵗先偷碧海春秋懐石存禮皷角城頭起一更鬱蒸消盡覺凉生飛螢入竹秋光淡老鶴巢松夜氣清又瓦爐栢子細烟消閒讀禪經破寂寥風細月髙人已静隔忩踈竹夜蕭蕭又溪上芙蓉映醉顔悲秋宋玉鬢成斑無情最是東流水暗逐年光去不還前題馮裕海上梧桐一葉飄瀛洲風色共瀟瀟仙人何處吹笙去老鶴蹁躚白玉橋又風捲烟雲幾萬重東溟漠漠静魚龍曉來獨跨華亭鶴飛過蓬莱第幾峯又秋風溪上芙蓉花溪邊女兒來浣紗顔色相輝都不語暮雲𣺌𣺌隔天涯前題劉澄甫露下風髙旅雁回霜空木落菊花開長門自閉傷秋月那得黄金買賦來又蘭堦玉露百花殘桂殿金風一夜寒珍重齊紈秋再熱主恩爭得等閒看又長信空堦螢火流昭陽碧殿月華浮寒鴉聲斷君王寵獨抱雲和恩不休又秋光淡蕩暗雲平露滴宫槐風滿庭青鳥不來仙駕杳紫臺長望酒初醒又逺塞踈蕪逢暮秋深閨寂寂對窮愁黄花開處堪回首白雁來時獨倚樓又梧桐朝隕玉欄前絡緯宵啼金井邉孤燈耿耿燼欲滅新月娟娟人未眠前題陳經金井梧桐髙入雲數聲秋葉堕紛紛獨憐長信宫中道簾外黄昏不忍聞又深院空堦秋氣清驚心物候眼邊明輕烟漠漠鳥雙去零露瀟瀟鶴一鳴又雲卧巢栖滄海隈扶桑朝日望蓬莱樓臺蜃氣烟霄外雙闕疑瞻五鳯迴又海燕窺人巧自謀棲身髙入五雲樓爭知社日辭巢去故壘蕭蕭風雨秋前題黄卿幽賞獨消夜景清紫薇零露鵲枝輕分明桂魄懸虚碧似雨兼風樹樹聲前題劉淵甫秋到旋添黄葉徑風吹偏冷白雲居半生貧病甘踈拙不怪朋逰不寄書苦雨石存禮夜忩風雨送髙秋一枕簷聲萬壑流可是銅壺添海水麗樵不報五更籌又自是悲秋怕見秋喜看大火未西流如何幾陣芭蕉雨又作南忩一夜愁又新秋一雨苦傷神徹夜空堦滴到晨機杼有聲連蟋蟀畫圖無夢上麒麟又随身長物書千巻閲世髙風釣一緡報説西疇差可喜青黄野色望中勻前題馮裕山村十日霏霏雨髙下田原緑水平一帶農家多寂寞炊烟時見起孤城又風雨瀟瀟一月餘前疇稉稻半為魚可憐海上騷人苦不得斜陽照濕書海岱㑹集巻十二
