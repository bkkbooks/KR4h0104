body:
  text: 海岱㑹集卷一古樂府君馬黃馮裕君馬黃我馬駰馬不同色人一心前年聨鑣洛陽陌今年共踏洋溪雪前題劉澄甫君馬黃臣馬白君馬日立赤墀中臣馬行當雪山磧玉勒嘶秋風雕弓抱明月十二間中雲錦花三千里外寒風沙香閨紅顔泣成血邊城白骨多如麻交河北流無青草年年走馬交河道有所思黃卿有所思思無狂獨居扄户意何飄揚五嶽伊邇崑丘渺茫愚公移山河伯望洋出入作息歲時田桑控馬以綏止水芳塘蛛絲在簷蠶絲在房人生無羽翼思逺徒倣徨戰城南馮裕前歲戰在雲中今歲戰在遼東玉林塞南穹廬滿廣寧城邊人烟空年年春草腓更緑不知征戰何時窮將軍枕戈黃龍戍天子旰食甘泉宫憶昔犁庭絶漠北焉支祁連入中國邇來牧馬漸南侵河外三城收未得朝出戰暮忘歸别新婚逺庭闈忠臣義士心所希但願黃金印似斗寧辭白骨甘如飴巫山髙黃卿巫山髙邈難量望望隔雲夢江漢有舟楫山深不可窮珍璧與丹砂穴深虎豹叢田居有牖步有笻無泛洪波兮無登奇峰蝶蝶行劉澄甫春風蝶翩翩春社燕來舞相逢東園中參差桃李樹銜之哺新雛香魂託誰怙秋深蝶亦稀秋社燕忽去得失無可問惆悵寒江雨前緩聲歌疾趨無穩步猛槳無安流風禽難比翼湍鱗難縱遊人生適意耳何為苦淹留帳中越女歌席上楚妃歎婉婉燕姬柔裊裊秦娥粲白日忽巳匿華鐙猶未息歡極將奈何悲來淚霑臆前題劉淵甫髙弦無細響急水無回波息我忿悁心聽彼從容歌宛曲蘭室幽柔軟春風和舒徐稱皓齒轉換隨輕羅有短更有長非少仍非多淒清舞自憐斷續今如何雖嘆霧中花難比燈上蛾常使樂有時一任朱顔酡董逃行劉澄甫一尺布千里草兒童謡非不早長樂火郿塢灾天之道往復來允之墜雍之獄終於盡有榮辱一董滅一董生去長安營許京四冦去仲英挫五馬來孟德破魏公錫晋公繼作者誰了不異福中禍禍中福反掌間真倚伏前題劉淵甫杞人無事懷憂坦平之地生丘補衮有具皆休都邑偶爾綴旒衣冠豈但含羞鳴雞犬吠家家往時爭競浮華火消沙散如麻狂風振樹驚鴉兵鈐入手堪嗟廣廊大厦森然倚憑氣焰薰天燕歌趙舞輕線一朝事業變遷追思快日豐年穿石斷幹因循納基絶胎正人往來却似避秦覆車之戒猶新禍兮與福為鄰榮枯徒令我傷須知本固根强移山之術空忙幾見終日飛霜何如守分安常西門行馮裕浮雲日夜行流水赴東海人生能幾何容髮忽巳改釃酒炙肥羊瓠葉亦可采及時召良朋不樂復何待前題黃卿出西門望雲之岑碩人在何許言念勞我心一解採藍葉薦白華擷去不盈把欲濟河無涯二解路逢游冶子招我以螺觥芳醇羅嘉爼欲留還不能三解我行絇屧山塗阻渴下掬泉清且深上有梧桐如銅青欲取繫絲徽黃金四解居常嫌擾擾浮世何所營願言慎服食綿綿學無生五解前題楊應奎索居思沉鬱西門聊躑躅顧景開逸懷尋樂散幽獨汨汨陌上塵湛湛溝中緑長嘯登危峯濯纓臨碧流臂鷹走黃犬繫馬醉青樓但知樂意洽寧復幾時休醇醪味本甘肥牛炙亦美呼我所歡人解我心中譺不醉莫來歸厭厭猶不巳人生七十稀所患常千百惜隂各有為勞勞自成拍焚膏繼日晷兀兀髮巳白洪崖與浮丘欣欣難枯槁白日生羽翰紅顔常不老眷此血肉軀安得復年少死生既有命富貴必由天黃金能聚散日月易推遷財虜不解事空為人所憐東門行馮裕戚戚困故里衣食不自謀拔劍欲出門妻子苦遮留云不願富貴但願相對貧豈知男兒志四海區區離别何足論前題黃卿出東門茫茫夾巷通衢孰指適市㕓多隱語目視流波笑相測一解持粟易農器器少兵械多南山有鐵可採無冶鐵奈何二解爾賈不我告實但㑹誕黠可知方不用矩圓不用規酒酺不及止何為三解欲飴得蘗汲水成氷彼人笑傲豫歸以平險阻密林悵何髙深馬駕緩行猱輕以升四解對酒馮裕對酒欲歌咏冬廬暮不寒外聞擊壤叟邀賔共蔬盤讀歌秋竹曲願賡甘棠篇叟謝止飲和曲良難三農隱憂孰與為歡冬鮮霰雪恆晴而暵遺蝗伏壠宿麥垂乾願言潔酒供醴紛拜龍祠雲壇今此下民災孽風伯雲師豈其俯顧豫安余敢同無憂之華屋綺紈又對酒歌豐年年豐實堪樂東家釀新黍西舍儲舊酪南鄰鸚鵡杯北里鸕鷀杓時有杜康來且共淵明酌傾銀而注玉何如瓦與礫烹羊及炙牛爭似藜與藿倉箱喜盈收場圃多刈穫晝無捕蛇役夜少豪吏索頒白遂安飽黎黑免飢虐天子甚聖明宰府兼廟略草夭木巳喬鳶飛魚自躍但寡旱蝗灾聊爾紆民瘼碣石篇黃卿碣石復出陟彼壯觀羣山半沉澥渤浮天日光湧蕩鯨鼇晏眠艦艘游泛渺渺澄漣海不揚波維國之正越裳肅慎來貢雍雍秦橋漢廟堙沒蕪墟彼碩垂釣悠哉樂且前題劉淵甫東臨碣石觀海如天深自有底寬亦有邊桂樹匿隂扶桑出陽千變萬化海水如常東海碣石觀海利多海賈貪求輕視風波利同害同藏珍匿寶螭龍有珠得之更好東海碣石觀海歎生一旦成田有時結氷積之歸墟泄之尾閭欲保終身養之在初東海碣石觀海深奧古稱達人想不輕蹈海不揚波明時建功壯年不勵白首難成滿歌行馮裕百憂集我懷清酒滿金罍春風忽又到桃李參差開一飲一盡醉不用主人催古來稱逹道惟有漆園叟朝菌齊大椿況復論好醜悠悠天地間盡是無何有前題劉澄甫傾樽對歌人生幾何日邁月征樂少愁多天缺西北地漏東南盈虗消息矧爾人間磐石可透井溜可穿固亦人力漸摩使然簣土成丘涓滴成河積寡為衆匪由其他舜禹在位巢許棲巖周公鴟徙接輿鳳鶱彭聃為夭顔冉為壽求仁得仁修短何咎生者如寄死者如休樂天知命而復何憂前題黃卿處世將擇安波翻山峻事故多端甘貧白首進退知難仰天見星昏聚曉殘空懷不平髮怒衝冠忽忽非少壯富貴不可求擊膺隱形巢父忘愁吾將為賔復稱許由哲人逝矣將誰與儔趨炎惡涼遽爾飛騰重義輕利從善如登毁譽在人中心兢兢泰否有時君子循常闕想多傷董生下帷法彼修藏疏老散金任彼徜徉可行可止切戒沽名嘆惜佳辰酒味歌聲無尤無怨何辱何榮俯仰之間遣興舒情當風秉燭碌碌虗勞樂不可極㑹見霜毛天長地久恬養為髙公無渡河劉澄甫公乎公乎河水瀧瀧中有蛟龍得人則喜我心􅍵􅍵公乎公乎河水悠悠下有神􅀢嚙人至骨我心愀愀公乎公乎爾之游矣載沉載浮我之憂矣無梁無舟公乎公乎腰錢胥溺利害綢繆剖珠自藏吾將何尤獨漉篇獨漉獨漉駟馬丹轂時運茍去馬斃車仆桃李不言下自成蹊烏鳥莫辨誰知雄雌猛虎負隅徒搏何為蝮蛇入手解腕巳遲富貴可得執鞭當前貧賤可離脫屣何難禍福靡定無乃自求怨天尤人君子不由陳母知廢陵母知興俟命居易智者無名前題黃卿獨漉陂澤行潦漲渾波渾何傷客行無津翩翩白鷺泳水不濡逐鶖逐獺無為爾虞確確者石河流滌之有美一人其介如斯誰探古穴獲璧冠玉願言珍藏千金莫贖豹虎近郭嬉遊縷縷壯士不刺磨劍何為暮雨魑魅嘯見其吻雷轟霆擊吁為韲粉善哉行劉澄甫作僞日拙作德日休為善常樂為惡常憂禍福無端真若循環有酒不飲空復長嘆上山采芝偶逢安期與棗似瓜其甘如飴入海求仙忽見偓佺惠藥一粒其色如丹自知歲短將可奈何慚無魯陽舉手揮戈日東月西素髮參差親友在門且慰須臾君子行馮裕岐路異燕越素絲基𤣥黃君子慎顛末志士思針芒辭輦恐嫌疑震主憂危亡鸞鳳化鴟鶚屠繒為侯王天道尚反覆人事殊難量遺金豈足辨還牛仍自明磨刀不見損砥石兩相傷啖服欲求飽身斃還為殃聖人絶思慮元化直茫茫飲馬長城窟行劉澄甫飲馬長城窟城邊多白骨征馬嘶不前戰士愁難越秦皇築紫塞萬里空流血漢祖圍白登三軍困飢渴馬邑夜蕭條龍沙風慘栗十去七不還一札九嘆息男兒誇健少婦女哭嗚咽凱歌何時唱旄頭何日滅善守在四方王者無奇烈前題黃卿平溪清見底泛泛雙鴛鴦中流見羣鷺啄啄相頡頏佳人呼征鴈嘹唳發三邊君子佐戎幕偏師逐右賢門前風起塵塞上風揚沙昔時栁飛絮今時雪作花白草獸駭奔中有龍種馬八尺蹄如銀駉駉不知價捉馬獻天廏願君離塞下前題劉淵甫長城築枯骨城下決寒流飲馬泉水深閉目遠天愁流水何時竭苦戰何年休鞍上珊瑚鞭手中金絡頭風沙慘漫漫鴻鴈鳴啾啾欲得家鄉書肯念征人不敢繫兒女思止因父母憂丁寧閨中婦善為甘㫖謀生當歸故園死當葬故丘艷歌行劉澄甫兩兩雲中鶴雙雙池上雁朝飛洞庭湄夕止天山畔奮翮共雲霄唼藻同燕婉良匹影不孤宕子情欲斷雖寄白頭吟自愛黃金館尺素書竟絶長門賦空歎本效孟光潔不學文君粲心貞道茍合萬里即閭閈幽懷寫金石憯然卧江漢前題黃卿菀莞水邊樹茁條壘石間孀嫗攜兩女逶迤上壠墦亂葉前迷路潦水跬步難貴家車如屋呼可共載還長娃低粉頸仲娃發赬顔阿母謂勿嗔徐行車自前健禽嚇青鳥義鶻不可干相逢行馮裕生死識交情貧賤見交態白頭尚如新青眼即傾蓋班荆信難值斷金義可㑹荆杞堂隅中胡越形骸外金蘭心與同雞黍期若待雨落復為雲恩深反成害重淵等艱深九疑紛向背久要變須臾戈矛生眦睚髙論廣絶交朋從惇舊愛苦寒行劉澄甫西北度燕然屹崛何盤桓峩峩千里雪漠漠萬重煙積水滿溪澗枯樹被岡巒悲風起巔末白日沉虞淵飢鼯叫空壕猛虎藏深巖貂裘不覺暖挾纊曾知寒將軍喜候封戰士多苦顔長城埋白骨窮廬擁青氊塞馬鳴不息髙鳥飛不還平生征戍勞寤寐誰與宣難哉苦寒行聞之尚心酸前題黃卿都城怯冬候邊城寒復寒九邊同凜冽雲中冷且艱萬卒圍城下睊睊鬱愁嘆逆豎戕主帥豺狠據重關相臣按劍怒猛將亟登壇露野相枕藉半菽風中餐白登雪雱集桑乾層氷堅又聞長征人呵手繫征鞍左隊泣墮指右伍傷凍顔苦寒何足慰僵尸那忍看幸逢明主恩挾纊誓相安條風扇和燠不戰凱歌還前題劉淵甫北風初涼雨雪初飛居家蕭蕭逺涉何依天下皆寒獨念遄征慘肌裂膚東山之行腹無宿飽身無重襖朝起見星夜眠在草披有狐裘坐有熊席爾心則安寧復我恤怨歌行馮裕巴江浮月色巫山橫露光孤鳥鳴如訴啼猿聲更長逺客撫七絃欲調不成章臣有逐萬里子有朝履霜桑梓空悵望江漢浩無梁巧言滅烈火浸潤傾髙堂楚士多幽恨屈子摧肝腸漢武誅江充後時良可傷虞舜放共歡頌聲流無疆浮萍篇相彼萍兮生澤中兮或聚或散隨天風兮相彼萍兮生中河兮或近或逺隨風波兮相彼萍兮生內池兮或西或東無不宜兮前題黃卿秋水見浮萍隨波何菁菁華不借黃壤葉不附菰菱萍生無根蒂男兒重橫行浮雲不可挽紫騮驕欲騰入山縛貔虎蹈海斬鯢鯨浮萍蔽波面下有百尺鱣萍流入江海藻泛金沙灘借問萍與藻附托何偶然健步自千里不羡生羽翰逹人志逺覽長路何足嘆前題楊應奎木生有根花有蕚嗟爾飄萍無所托幸因雨滋不免風吹倐來忽去安穩難期霰分密布空隨時彼行何行止何止人生聚散皆如此眼見水上萍更思萍下水猛虎行黃卿獵不避猛虎窟漁不近潛蛟湫潛蛟豈不躍烈夫多懷憂登髙眺霽景所思杳崑丘總轡歷險阻飲馬江河洲長風吹纓組洪波淬吳鈎晝不求粱肉暮不要侣儔鵾鵬運渤海榆枋棲鷽鳩寥廓何畏阻硜硜那與謀乞藥駐容色曦和當相留三復入虎穴慷慨終有酬天馬歌馮裕猗龍種之蹻蹻兮淩奫澤之渺渺兮失天間之騕裊兮負河圖兮文明銜赤文兮舜之禎矯首長鳴兮雄風生纎阿逖兮伯樂逝兮按圖索華鞿珂兮歸有德妾薄命妾本良家子嫁與游俠兒燕好能幾何郎心忽自移紅樓美清夜空閨愁夢思起視天漢斜新月如愁眉粧鏡空在匣麗服空在椸有時惟古歡惠然開重帷離心安可同悁悁倚前楣盛年巳見捐況乃薄暮時三復白頭吟緘愁將告誰前題黃卿團團明月上清輝射羅帷春園百禽集花卉舒榮滋風斂聞絃管履跡不能移箜篌手巳澀蟢子空來依尋丈踰千里韶光無還期巫嫗相女貴骨法非蛾眉玉貌豈相逺承恩分妍媸婚嫁誰不擇出門那可知連波去不逺王宋悲復悲齊有化蟬女衛有谷風詩耕莫苦風雨游莫苦路岐青松無改色誰望連理枝前題楊應奎光隂易逝難留暫登畫閣重樓流蘇帳暖香浮藹若陽春綢繆華筵錦席相酬稱壽舞獻婆娑塞曲明謳齊歌觥籌交錯蹉跎開懷盡歡顔酡醲酣飽飫合和周折禮度容與舉止疏暢沉魚狂態暗生絶裾法語束縛安居紅顔可悅禮裁操觚挈榼摧頽弱質纎體縈回金珠雜遝往來目驚心悸難媒黛銷緑減朱顔新聲轉風麗娟氣噴椒蘭間關雜進比西並班婉孌愛惜意慳開樽致歡驕奢祗恐酒數難加興䦨客子還家答言杯盤猶賒美女篇劉澄甫燕趙富美女窈窕多清揚麗質無粉澤冶容勝蘭芳盈盈桃李姿裊裊芙蓉裳細履珠翠飾高簪玳瑁光白如玉環潔輕若飛燕翔湘妃不可覩巫女詎能忘魚見為之逝鳥見為之藏明妃度關塞西子傾家邦色荒永垂戒閒情常自防飛龍篇馮裕仙人駕飛龍飄飄遊太空俯視世間人醯雞喧甕中一覽遍八荒稅駕在崆峒雲巘何巍巍澗水何淙淙𤣥鶴沖天飛仙桃蒸霞紅我欲訪大道趨風託仙童仙童感我誠引我瑶華宫拱立日巳斜仙人開雙瞳授我一束書期我扶桑東稽首拜受之漸覺心神融孜孜三十年大道隔鴻濛願謝人間事再訪青牛翁前題劉澄甫軒轅鼎湖騎飛龍雲軿象御浮煙空花顔月貌爭相從股肱耳目誰與同紛紛攀髯咸墮弓兩兩玉女偕金童銀闕嵳峩扶桑東洞天隱約蓬萊中拍手放浪山崆峒潛身頤養芙蓉宫白雲飄颻真難逢黃金銷灼不可鎔千秋萬歲傳無窮九還七返如捕風錦文緑字苔蘚封石函玉笈神鬼工紫皇邀我遊鴻濛叩之不語心忡忡前題黃卿逺遊采芝露冷林谷玉女跨鶴仙童騎鹿羽士在前飄飄丹鵠趨進謁之期我辟穀赤幢雙𨗳層城在目石英芳蒨玉膏滲漉言有大藥貯之海屋靈符三緘慶雲垂覆我無盈心粒丹自足霜華少黑老色少沃逍遙常居消中情毒焉能霞霄寥廓幽獨白馬篇馮裕長安有名將白馬何翩翩俯身馳大漠一劍當三邊萬竈如雲屯青天明月懸一鼓破月氐再鼓擒左賢單于聞之驚旃裘夜幾遷瀚海不揚波勒功在燕然榮名耀青史嫖姚應共傳前題劉澄甫白馬躍飛龍騰驤萬里行霜蹄蹴烟霞玉勒繞玲瓏背上鵰羽箭腰間烏號弓盤雲落霜鶚映日下𡨕鴻巳麗驃驍陳還堪左校衝單于單騎壘子儀五花驄九塞無彊敵六郡推才雄轉戰葱嶺道捷報甘泉宫捐軀赴國難慷慨平羌戎平生意氣在誓勒燕然功前題楊應奎白馬出冀北雕鞍覆錦茵皎皎西洛道蕭蕭清渭津馬驕鳴不止借問馬上人寶劍銛且博弩弓逾六鈞馬粟巳傾斛人飲亦將醺羽檄流星過邊烽報煙塵虎旅皆騰趫烈士豈逡巡驅去忽長嘯涼風薄黃雲追奔志慷慨樹功非希恩揚揚錦綺者列乘給翔麟換騎果下馬探賞桃李春白馬冏如雪白駒亦如銀乘駒入空谷生芻樂無垠燕歌行蒹葭蒼蒼露為霜梧桐飄飄金井牀絡緯啾啾蜩蟬傷𤣥燕寂寂白雁翔客子遙遙萬里行美人獨坐悲流黃秦川織錦非七襄陌上采桑不盈筐深閨煢煢思如狂參杓斗柄夜縱橫展詩續歌暫徜徉歌罷嗚咽悲中腸安得君為明月光流影一照妾屋梁披衣疊股坐待明耿耿銀漢永相望前題黃卿槐街冠蓋何翩翩華堂晴晝玳瑁筵絃管笳吹沸喧闐玉盤瓊斚紛花鈿中席酬勸嬉留連雄談琅琅同稱賢千金然諾白日懸肝膽意氣直如弦羲和急轡逝虞淵野薪風烈空浮煙聲名相軋臨要權貨利錐刀誰讓先炎日涼颸變眼前彎弓落石更可憐吁嗟傾覆自昔然前題劉淵甫楊栁落葉金垂絲鳥來鳥散聲音移他鄉應役復幾時去何容易歸何遲夢中寄書伸别離緘愁結恨那得知朝登暮涉心力疲回頭迷望悲天涯衣裳破碎無完肌篋中舊帛將付誰舅姑巳老諸子癡草生壠畝難耘耔終歲作苦難自持使妾不暇修容儀寬恩有日辭荒陲踐更算賦敢違期辰橫參暗空相窺風吹月照長相思上留田行孩提餅乳相怡怡上留田壯年䦧鬬怨阿誰上留田棠棣零籜根柯離上留田野中啼號鄰翁悲上留田歸家美酒妻與兒上留田諸兒齒壯將若為上留田海岱㑹集卷一
