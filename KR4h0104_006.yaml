body:
  text: 海岱會集卷六五言律詩人日黃卿人占逢七日春立已三朝岸栁催晨發河澌併夜消山猶含白雪雲自綴青霄笑向閭閻説熙雍賴聖朝春雨陳經南畝遲靈雨東風釀夕隂青痕縈冷砌蒼靄幕空林霡霂同春淺飄揚入夜深籍田先潤澤應慰聖人心上巳馮裕栁溪元已會鶴髮兩三翁蘭葉香風細桃花曉露紅探春平野外載酒曲流中髙調蘭亭侣吟詩興味同黃鸝四月轉清和流鶯百囀歌啼殘垂栁暗飛蹴落花多寂寞懷人處間關奈爾何雙柑攜斗酒且得慰蹉跎刈麥麥隴秋先至農功嵗序分半天懸赤日萬頃落黃雲共説豐年樂何妨社酒醺頌聲從此作應許續思文前題劉澄甫刈麥黃雲盡川迥碧水間涼風生緑野暑雨暗青山雞黍時能約牛羊夕自還捕蛇如免稅射雉且開顔積雨馮裕霖雨何多日占晴檢朔書垤沙仍集鸛渠竇已生魚莽莽瓜田白瀟瀟草閣虛愁懷無處著好學五湖魚野望黃卿逺郊涼思淨晚照古原斜無復壯逰興轉憐晴望賖山光界禾黍海氣閣雲霞不辨鳶歸處翩翩急暮鴉八月十四日夜月馮裕别墅中秋近天空月轉髙踰弦增皎潔隔望欠纎毫玉鏡涵蟾影金波漾海濤嫦娥許再會永夜醉香醪十五夜月淨掃茅亭坐溪山度晚風雲開三極北月滿九秋中丹桂霓裳曲清樽鶴髮翁古今吟賞興誰似庾樓雄十六夜月仲秋十六夜月出照清淄素魄光無減氷輪上較遲影隨雲漢下涼逐海風吹逸興應難盡髙歌送酒巵十四夜月劉澄甫山月光初就秋宵漏欲平倚樓人獨立栖樹鳥頻驚色借露華白影移蟾桂清因知明夜好有待坐三更又十五夜月天上中秋至商風薄暮寒橫波金縷細隔樹鏡輪安不減前年興誰同永夜看素光照華髮應惜此宵難又十六夜月黃卿重玩憐秋度持盈亦爾疑金波如未減皓魄稍升遲寒動明河色晴標永夜姿一樽籌漏滿重訂隔年期古鏡石存禮古鏡何年治千秋尚此留玉臺蟲網暗珠匣土花浮莫笑塵埃滿能令鬼魅愁生平寥落意對爾思悠悠九日登北山寺鐘樓樓閣倚中天登臨思渺然間身空嵗月老眼幾山川落照明秋浦飛帆濕暮煙憑闌悵陳迹餘恨付詩篇前題黃卿菊節寒留寺鐘樓早見山客緣佳景至僧共野雲間秋鶻忽驚影風鴻自綴班尚思千仭塔絶頂眺塵寰前題劉淵甫寺樓舒望眼重九當登臺木落郊原濶霜空鴻雁哀自鳴鐘應律值閏菊遲開短髮羞佳節相憐數舉杯搗衣馮裕良人久北戍况值秋深時砧杵月中急雪霜關外滋忽聞征雁過已覺寄衣遲何日胸奴靜東山更賦詩前題劉澄甫九月堪授衣三邊人未歸暮砧催短日霜帛捲重扉落手隨髙下停針憶瘦肥殷勤付鴻雁何日到金微前題劉淵甫明知秋已晚砧急露風寒清響雖同發憂腸各未安能辭午夜倦將送逺方難此夜無衣客應從隴上看對竹石存禮門對南鄰竹青青玉萬竿何勞買地種且得隔籬看露葉晴猶濕風枝夏亦寒長年無剪伐托汝報平安百丈崖劉澄甫瀑布垂千尺飛流銀漢低雲松攢玉殿鳥道上丹梯見日窺滄海凌空聽碧雞登臨興不盡岩壑晚淒迷歸雁石存禮雁來何太早嘹唳過南樓數點乍離塞一聲初報秋行行驚老眼字字寫新愁仗節人何在鄉書可寄不前題馮裕衡陽春色早羣鴈早知歸行入江雲杳聲飛塞月微隴愁深戍客漢信滯明妃若悟銜蘆意何如守釣磯前題劉澄甫斷續瀟湘去迢遙關山歸夜寒翻警枕霜老欲添衣風雨幾時定稻梁何處肥隨陽限南北恨别轉依依鵲湖馮裕昔年秋興逸每泛鵲山湖亭下採新藕船邊回野鳬滄浪歌正激白露酒頻沽何日重逰此清風月滿蘆前題劉澄甫歷下名園盛家家湖水清石橋斜入浦竹溆曲侵城進艇分山色彈弦雜鳥聲遙憐採菱女兩兩踏歌行蠲稅租稅年年急瘡痍何日蘇幸逢寬恤詔將慰海邦逋妻子仍無地謳歌半載途家家共牛酒歡賞願須臾織婦黃卿機下忘梳洗燈前勸飲餐薄帷當月近束素兢霜寒女伴勞相問嚴姑恐未歡風流金翠過不敢出門看文會禪房資麗澤禮飲定蔬盤有石堪攻玉如金更臭蘭笑談僧共坐杖屨俗驚看投老隨黃綺無心問漢官雪晴劉澄甫入夜同雲密平明霽景饒白添山骨夀紅見海霞標玉馬時應出瓊枝暖欲消盈虛占物理甘分卧蕭條前題劉淵甫積雪且遲掃開晴頗散愁間庭無鳥迹擁坐有羔裘素館映虛白清尊缺獻酬扁舟如見訪好為戴生留迎春花馮裕春意朝來動園亭看早芳濃香分北海巧笑迓東皇餘潤留殘雪先資借太陽還輸梅一著至日倚氷霜山寺閉關劉澄甫野寺經逰少寒山早閉關月沉松影寂雪咽水聲間客散僧仍定雲歸鳥亦還靜中有真意物外可容攀負暄馮裕炙背茅簷下無衣卒嵗難應憐趙孟日暫解范生寒歎息貂裘敝瞻依廣厦寒晴暉無可報只益寸心丹前題黃卿野翁移草坐簷下日當中瘦影身相較暗曛物與同惜年驚度臘呼伴避當風為問趨炎客安知造化功初風晴望馮裕春曉扶笻杖天空野望開四川雲影盡萬里風聲來海暗仙人觀城荒仲父臺古今成俯仰倚樹且銜杯前題黃卿逺望遲移午餘寒立轉溫閏催春有色晴解凍無痕栁暗青山郭鳩鳴碧樹村幽人别有興不待百花繁海岱會集卷六
