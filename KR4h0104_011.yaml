body:
  text: 海岱㑹集巻十一五言絶句襄陽樂馮裕朝徃大堤去暮還襄陽城美人不肯别酌酒更彈箏又襄陽諸女兒隊隊踏歌行日落楚天碧月髙江水平又家在峴山前門繫武陵船桃花嬌可愛教妾若為顔又江水流無極郎歸來有期潮回憑寄信為到海門西前題劉澄甫妾在廣陵陌家臨明月橋郎君觧憐取趂著木蘭橈又曉行白雲渚夜泊黄鶴樓秋風何處覔飛夢到瓜州又歡醉習家池儂宿彭郎磯東風吹酩酊夜雨恐凄其前題黄卿樊城卧紅橋掩映七十二下通畫艑舸上馳華珂轡又東風與垂楊低昂相憐取南學西陵歌北學邯鄲舞又陽春酃緑酒嬋娥自當壚調笑東逰客何如廣陵沽又盆中菖蒲花一夕兔絲繞相贈紅襦襠莫似站林鳥前題楊應奎并州快翦刀惜吝不忍買儂有合歡帶綢繆豈能觧又欝欝藤與蘿引蔓兩相齊秋霜揺落盡至死不相離又儂心漢江水歡意如孤舟舟行有去住水常日夜流西洲曲馮裕楊栁覆西洲芙蓉映翠樓春情獨自覺江水日悠悠又羅裙蓮葉緑丹靨蓮花紅相逢獨不見含笑水聲中又估客何處來倚棹花門前折花愁問訊心如不繋船前題劉澄甫采蓮南渡頭采菱西洲口日落不逢人秋雲重回首又鴻飛似無跡燕來如有期鈎簾坐春曉幽夢竟誰知又早向西洲行暮向西洲宿西洲人獨愁翠袖扳幽竹前題黄卿弭棹傍西洲採菱洑波曲菡萏並蒂開中有雙鴛浴又西洲檉栁岸蜻蝶集復散忽落碧玉釵囘頭問同伴又憐伴嬌喜笑愛唱長干調冷冷金歩揺薦芳聖女廟又容顔如春芳愁思如零霜避霜玩朗月千里共清光又廟前雙梧桐蕤那揺東風桐下結衣帶蟢子拂人額又月光射帷帳流螢逈相向焚香歩空庭三星在頭上又徃訴薄倖人别來秋復春西洲雖見月不照翠眉顰前題楊應奎水邊桃花發水映桃花紅掉舟約萍開萍散桃花空上元觀燈劉澄甫今年好燈社是處結樓臺舞袖翻新栁歌喉轉落梅又山從鼇背立人向月中逰雪盡九華殿春歸五鳯樓海岱㑹集巻十一
