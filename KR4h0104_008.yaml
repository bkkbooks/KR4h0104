body:
  text: 海岱會集卷八五言律詩曉鐘馮裕春眠嫌夜短忽聽曉鐘鳴度竹來虛枕穿雲響太清悠悠晨夜界脈脈古今情獨起披衣望瀛洲曙色明前題劉澄甫何處鐘聲息楓林早夜聞白頭愁已過清夢耿初分斷續秦樓月悠揚楚岫雲間身常晏起窗影任髙曛前題陳經霞起重城曙鐘傳古寺風喚回清夜夢杳入白雲藂一卧淹滄海三年别漢宫覺來動深省山月照忩空前題黃卿滄海躍靈起蒲牢五夜嗚星河分曙色風雨約雞聲度自樓臺回聽連鼓角清晨光已今日感慨萬緣生洋溪逢漁父馮裕春時洋水曲邂逅見漁翁把釣苔磯潤停雲夕照紅相留惟濁酒共醉倚清風萬古浮沉事都歸一笑中前題陳經溪上逢漁父幽談坐夕陽潭雲過水白岸栁覆橋黃鷗鳥機初息滄浪興轉長欲窮垂釣意鼓枻入蒼茫前題黃卿城隱清溪曲行逢滄海漁常憐魚鳥伴莫道網綸疏樹色橋頭徑鷗羣栁下渠長歌欸乃調歸棹入煙墟早春小圃桃花欲開陳經青帝無私澤園桃花欲然蓁蓁新緑嫩的的小紅鮮色映宜歌扇香浮近酒船會須看結實方朔與同憐前題黃卿浸尋春到處佇立小桃傍纎錦分苞嫩新脂幾瓣香依依如有恨脈脈未成粧此際堪臨賞翻嫌爛漫狂觀稼石存禮晨隨田父去薄暮始言還逺水鷗邊渡夕陽牛背山一秋生事急百嵗幾人間野鳥投林盡相看只厚顔前題馮裕天地忽新秋秋風禾黍稠攜樽開北海拄杖過西疇山外回晴景村邊起暮謳偶然逄野客談笑未能休前題劉澄甫薄田慚負郭晚稼望東隅水閣搖花塢山風落井梧兔葵聊自慰雀黍為誰驅暑雨經旬日倉箱未可圗前題陳經野望天無際油油禾黍成青黃秋雨後隴畝暮雲平社鼓村村樂雲舂處處聲田家新酒熟扶醉道相迎謝故人惠葵扇故人遺我扇紈素豈堪云價重千筠製身輕一葉分傾陽存舊質却暑䇿髙勳未忍捐簞笥時時憶見君晚涼洗馬馮裕偶來高樹下坐看浴驊騮涼入回溪淨隂連古木稠人猶憐暮景馬亦愛清流似識追風足超騰意未休前題陳經夕苑飄涼吹金隄浴紫騮追風聊息足汗血尚存韝喜與龍為友羞將玉絡頭漢家重天馬應向渥窪求人日迎春石存禮七日逢人好東郊始迓春青陽為故物白髮亦新人鼎鼐調羮業乾坤報國身年年無外事詩酒度芳辰郊逰看竹楊應奎郊原籬落外誰種翠琅玕鳯尾蕭蕭舞龍根寂寂蟠水浮春色淨沙護野雲寒試問同逰客何如林下看榖雨馮裕又驚三月半載酒過清淄甘雨應時落新苗到處滋開畦勻緑水䇿杖聽黃鸝好謝南鄰叟春來屢寄詩夏初雨中對酒初夏園亭靜南風好雨來間階披細草濁酒㵼深杯牧笛青蓑濕漁舟短棹回乾坤添爽氣此景即蓬萊問園丁幽事劉澄甫頻年學老圃幽事近何如抽笋沙勻砌移蔬水滿渠隔忩呼倦鳥臨檻飯逰魚夏簟貪長日間居賦自書松隂小院孤松樹清隂坐撫時蟬聲藏密葉雀影寄喬枝寂歷子初落遲回日不移盤桓須盡興愛爾共襟期送陳東渚北上石存禮祖帳憑雲閣揚旌擁路衢寸心依魏闕長珮謝蓬壺勳業虞三禮文章漢兩都明良須此去何以慰樵蘇夏夜石存禮獨坐萬感集髙城初漏過起行明月底靜看落花多林影沾清露池光接絳河終宵愛涼爽不問夜如何前題黃卿間極覺宵永坐深知露涼遣懷聊命酒愛月屢移床北斗回杓近髙城下漏長懷人無限意詩寄水雲鄉前題馮裕日落空階坐南風不肯來銀河空皎潔螢火轉徘徊忽聽鄰雞唱頻驚漏箭催依依山吐月顧影上蒼苔水閣石存禮草閣經秋淨柴門傍水開捲簾青靄合倚杖白雲回點點螢髙下翩翩鳥去來林泉搖落意有興且銜杯前題楊應奎岸栁垂隂密蓮池布葉齊簾櫳回曲檻梁棟蔽髙題燕坐風生腋微吟月滿溪偏宜乘興飲無問曉雞啼息隂馮裕息隂芳樹下草木有餘清海月微茫出山雲次第生野煙籠曙色爽籟發秋聲自得悠然趣都忘軒冕情前題劉澄甫老嫌筋力倦息愛樹隂涼壺醑留連飲藤床到處將卧分沙鳥席坐傍水雲鄉日暮遲歸詠蕭然世慮忘小園小園鋤菜甲早起課園丁開徑惜芳草看花護落英烹葵朝入饌翦韭夜炊羮客至慚供給盤飱逺市城秋思商飇起金屋黃葉滿珠樓情逐流螢夜恩隨紈扇秋青苔朱户閉白露絳河流芳思誰能識深宫倚暮愁秋夜村雨聞蛩馮裕新秋聞蟋蟀雨過正黃昏斷續空階下凄涼暗草根懷人應不寐隱几欲無言九月茅堂夜吟詩倒緑樽秋夕憶隱山上人髙僧飛錫去野菊正芳芬瀛海秋宵月滹沱日暮雲獨行山曠寂靜坐夜平分嵗晚歸禪院焚香洗印文前題劉澄甫飛錫出青山緇衣幾日還夜忩松雪暗石榻野雲間煮茗洋溪曲談詩蓮舍間逺公不可得誰共一開顔賦得原上草新緑連洋曲沿溪風正輕意含郊雨潤色藉海雲平愛近花禋坐愁縈栁帶生王孫歸未得悵望若為情前題劉淵甫原上年年草王孫復此行漫催人去住逺與徑縱橫雨潤柔還緑風吹萎更生幸隨時序發蘭蕙敢齊名春晴小園眺望劉澄甫竹籬停夜雨鳩杖倚春晴色映池邊草聲傳樹杪鶯移床惜花落開牖見山橫自負差強健登臨眼倍明初冬宿田舍石存禮委曲疑無路幽深别有天偶披青嶂入得與白雲眠樹密歸寒鳥溪回響暗泉草堂終夜寂髙枕聽鳴絃春日過城南野老村舍陳經花塢春深好城南原上村入雲茒結屋近水竹當門野犬來迎客山櫻笑映尊坐長幽興愜歸路欲黃昏海岱會集卷八
