body:
  text: 海岱會集卷二古樂府鞠歌行馮裕荆山産良璞中有寶玉英卞氏偶得之兩獻楚王庭前後蔽讒言哀哉懷與平祗聞鑠黃金不知毁連城懷璧固其罪獻玉仍被刑抱璞空山下嗚嗚日悲鳴涕盡繼以血寸心始得明足斷難再續封侯亦虗名寄語後世人衒玉難為情前題黃卿時雨足光風飄芝蘭深谷芳且髙鳥同色馬同毛笛竹臨爨桐半焦噓如露叱如飇金珠過海誰為橋功可擬時難遭謗書貝錦何譊譊桂為楫柏為橈浪平風順何逍遙豫章行馮裕豫章出深山亭亭一何長深根蟠重淵修幹摩穹蒼匠石持斧斤致之京洛旁棟隆豈不美生以才自傷何如南山櫟根幹常相將前題劉澄甫出處本無定隱顯難俱宣禍福起轉轂是非明蓋棺神禹禪虞舜祀夏垂永年傅説夢髙宗法祖應配天揚雄乃頌莽樂毅遂辭燕李斯諫逐客田文愛養賢堂奧生戈矛杯酒釋兵權萬事多錯忤倚伏理循環門有車馬客行馮裕客從金陵來倒履走相迎把袂上髙堂共坐話平生訪舊半凋謝一語心一驚憶在少年日良會羅羣英看花長干去載酒秦淮行别年僅十載落落如晨星惆悵將如何千里江雲橫前題劉淵甫出門見逺客試問來何方風塵悴顔色行李惟擔囊相延入我室酌酒未盈觴忽忽歎逺别俯首兩倣徨世態豈一端片言安得詳辨容異老少感舊多存亡朝是夕仍非尺短寸反長世情若蕉鹿出門皆羊腸不能順流俗何不歸故鄉門巷尚如昔桑棗巳成行光隂無回期人命同朝霜親舊每相見丘隴幸未荒去就兩決絶名譽徒虗彰折楊栁手攀楊栁枝上馬别親友父母願榮顯妻孥爾何有富貴一朝得豈謂日復久黃金炊玉竭白璧馬自售季子裘巳敝買臣婦不守平生意氣在肯令此言負再整青雲冠仍啓談天口致身霄漢上功名稷契右白晝忽歸來黑頭曵紫綬誰憐貧賤交旦夕成老醜放歌行劉淵甫氷蠶不知寒火鼠寧識春物性安所習志士曽因循鳳歌避塵世龍躍升天津三聘往草野一顧傾渭濵即圖國士報肯虗明主恩短服謝韋布華組挂朝紳戚姻待舉爨賔客喜乘輪志滿氣亦揚滿前皆交親人自敬長史賔主徒殷勤東武吟石存禮古有豪俊士混迹蓬蒿中劍耻一人敵射學千鈞弓獵手應石虎釣竿拂飛熊時違困文史壯志喜從戎赴募燕頷相麾下猿臂公西報玉門捷北勒隂山功張騫既巳老李廣卒難逢謝職困郵吏帶酒過新豐客散亭障暮囊罄杯盤空西山景將歇東武歌徒雄出自薊北門行劉澄甫幽薊饒霜雪先秋即凛冽風土尚獷悍征徒各雄傑捐生乃其常不啻荆與聶計斬單于首誓飲胸奴血泥封玉門關馬躪龍堆缺朝聽漁陽鼓夕望燕山月憑髙瞰狼胥乘危探虎穴陳冷鳥不下河氷骨欲折羽林本孤忠中郎弊旌節歸來圖麒麟生平重閥閲前題黃卿薊門連亭障北望白草腓堯封遺溝洫秦塞何纍纍征馬飽苜蓿干旌映珂鞿鐃吹風轉急狼煙騰復微生飲鸊鵜血戈劍瑩生輝撩揭男兒健相逐誇戎衣行行聞野哭言寇掠且歸挺身出大漠武士爭追隨誓射天狼落寧言貔虎威問我馳驅志庇民奠邊陲首功報幕府將為刀筆欺桓桓烈士恨犒爵竟何為空城雀馮裕空城雀空城雀蓬蒿仰而棲藜藿俯而啄黃口易探取短墻非所託腥臊豈足薦鸞刀彈射時復遭兒曹雀乎雀乎將奈何鳳翔千仞無虞羅行路難石存禮行路難路多岐青天白日光照地出門相背東西馳憶昔貧賤時兩情如膠漆共言生死不相違握手披肝誓天日君今得意成大勳金章封侯蒙主恩一朝富貴誰能及翻笑傍人百憂集平生金玉安足論對面不肯下車揖世事悠悠寧可期芳春花木秋易衰冰霜歲寒不改色却羡南山松柏枝前題黃卿歌莫歌塞下曲吹莫愛胡笳長古溪沙埃白草仆隂山苦霧連大荒健士馳驅幽閨泣容華何如筋力強丈夫骨相分茅土隂符弧矢空昻藏蔡澤頰舌一朝貴白頭飛將事戎行團扇郎石存禮團扇團且潔人言似明月明月恐不如長圓未曽缺前題馮裕贈扇不贈鞭畏行千里道對月與搖風郎亦知多少又人言秋葉扇入篋更為珍我亦收綵縷明年紉復新前題劉淵甫步階無纎塵出袖半遮面一日幾回看即與郎相見前題楊應奎秋風歇團扇郎心中道變殷勤度歲寒夏來還相見碧玉歌馮裕春風桃始華碧玉入王家金杯深緑酒麗日明朝霞前題劉澄甫碧玉破瓜時鬒髮才覆額朱顔奪夭桃黛眉學新月又碧玉破瓜時即誦白頭吟千金學歌舞一笑傾郎心古别離石存禮北風吹征帆飄飄西南馳山川聿修阻霜露忽淒其顧我逺行邁豈不念歲時歲時豈不念簡書良在兹翩彼晨飛鴻翺翔亦何之感我同袍友戚戚懷仳離仳離雖可懷觴酒當載時願言崇令德金石以為期前題馮裕良人將逺涉離别在斯須褰裳問歸期涕淚揮階塗去住各長嘆莫忘舊歡娛人生有離合譬彼天邊月三五清輝滿虧缺亦倐忽月虧行復圓人歸看白髮前題黃卿江南送别處芙蓉遍池塘江北送别處青楓夾垂楊折條不折蕚相對惜幽香閨中懷征戍臨岐餞舶商江樓髙十仞登眺渺蒼蒼孔翠出嶺巘西驥入漢疆舊侣亦慨戀何況阻彼良名都理征轡迢迢道路長道長何足惜薄言添襦裳今别愁在貌古别鬱中腸四座且停詠離弦弛莫張願吹簫與笛招鳳還梧岡晉白紵舞歌馮裕越姬白紵鮮如霜朅來裁作舞衣裳青春宛轉耀日光中庭翩翩白鳳凰四郊無事和風揚大官卓午瓊筵張有酒百壺清且香君臣同心方樂康髙歌妙舞殊未央人生少壯焉能常前題黃卿名苑風和紅粉飄瑶席繡茵落翠翹燕箏趙瑟按秦簫齊著白紵解綺綃輕袂宛轉舞翛翛屣步躍履折楚腰對蹲轉盼離復招鴛鴦翩躚雲影搖吳蜀混一海澄清徵歌選調咏太平江南白紵機杼精皎皎霜練致洛城有美春服製初成絢麗未知鶴羽輕簪紱髙會傳金觥願主福壽山嶽并野田有雀行石存禮十畝之間雀啾啾止蒿集萊鳴相酬逺川遙陌路孔修原田茫茫禾黍稠秋來古樹風颼颼夕陽慘淡沉西丘羣飛羣下不相求銜穗食穀安無憂南有樛木在芳洲雌雄迫暮共依投咄哉兹禽多詭謀性行佻巧孰與儔非羅非丸致無由草竊姦宄將何尤吁嗟此鳥毋久留願汝化蛤湮東流齊謳行劉澄甫齊國善諷謡齊女能謳歌臨淄佳麗地貴富侯王多營丘據形勝十二當山河迤邐琅琊饒膏腴即墨奢漁鹽並粳稻海錯紛交加浮磬有遺音孤桐挺陽坡檿桑中琴瑟綌絺勝綺羅桓公敬仲父威王烹東阿田單走燕騎魯連卻秦戈天道豈常泰人事或坎軻君相胥汨沒霸業終蹉跎逹士解止足去去將如何前題黃卿齊瑟調素越簫管自伶倫舜胄傳韶樂師摯正雅音季札精賞鑒綿駒何足云爽鳩肇茅土尚父治維新青陽條風起萬化先受春産殖兼海陸充牣腴且珍澥渤深無際岱宗崇入雲洪河界右址肅慎直東鄰疆域何膴膴形勝當西秦輔周表列國一匡濟生民稷下萃文史爼豆饗耆賔髙風魯連倡義烈王蠋敦俗尚輕千駟風韻流千春關山月馮裕關山月皎潔如清霜連營接幕夕流光流光猶得照故園征人見月徒傷魂四時弦望如流去可惜韶華暗中度深閨少年兩别離還如嬋娟缺半規缺半規三五來復圓一身逺戍何時旋前題劉淵甫關山月關山月萬里清光有圓缺宵從溟渤出微茫曉向崦嵫看皎潔玉門迢遞交河長鴻雁南飛素書絶機中錦字織不成隴上征袍泣流血山髙行未還月冷身猶單香閨惜瘦影戰地增苦顔雕弓明漢壘鐵馬度蕭關長安樓上客把酒愛高寒臨髙臺馮裕寒雲起天末獨自上髙臺塞鴈東南行淅淅西風來昔我同心友渺渺湘江隈淩空望湘江秋老芙蓉開前題劉澄甫臨髙臺水渌芙蓉開文茵繡轂坐瑶席鳳笙龍管吹落梅北瞰銅雀館春風階草短南眺臨春閣夜雨江花落東上鳷鵲觀西對蒲萄宫關樹重疊緑山櫻寂寞紅新豐逺接青雲起長安甲第朱門裏舞榭鳴鐘日欲西佳人取醉典羅衣雕簷繡柱盤龍虎豪客探鈎月卓午兩兩鴛雛水靣飛蕭蕭螢火窗前度景物不可留幽懷向誰訴憶昔咸京繁盛時可憐東洛並芳菲只今桃李皆無主何處牛羊仆墓碑髙臺髙臺不可上章華柏梁塵土障前題黃卿臨髙臺俯檻前有芳桂芳以樛河水浮槎望如舟蒼鶚雲起翩以遊持丸擊鶚祈我親壽千秋依中流洛陽道劉淵甫洛陽昔全盛輳集競繁華歌鐘連九陌樓臺接萬家御水年年栁名園處處花嬌艷固絶倫相逢日又斜地形控襟喉雄圖匪矜誇盛衰雖無端變動先萌芽世事隨轉燭晚路如奔車人物偶蕭條感念長咨嗟海岱會集卷二
