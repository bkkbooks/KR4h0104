body:
  text: 海岱會集卷七五言律詩東郊石存禮為愛東郊好笻枝伴獨行花香能醉蝶栁色欲迷鶯但得青春在何妨白髮生斜陽紅盡處一片暮山橫前題馮裕散步東郊外春深景物繁髙低楊栁岸紅白杏花村海氣分陽彩山容減燒痕方思谷口客移杖過柴門前題黃卿出郊常是懶學曠近為真潤野當膏雨聞鶯偶仲春入村須住步隔水共招人但恐桃源失尋逰豈厭頻謁倉頡墓楊應奎雨粟書初兆結繩風漸移巧因鳥迹出象應馬圖垂制作今逾麗儀型古莫追翻思文勝日托始有餘悲海燕馮裕秋返烏衣國春來玉水隄興衰殘照裏王謝畫梁西曉幕參差過晴絲掩映低宫中曽第一應憶上林棲前題陳經適至從何處來巢白玉堂芹香眠翠羽花暖伴鶯簧入幕甘棲托沖霄任頡頏有時秋氣逼亦復返江鄉雷劉澄甫殷殷南山動轟轟北極回卧龍能自奮甘雨尚須催酷暑聲應掃妖氛震欲開九天流解澤先向海邦來桂花石存禮雲階有叢桂枝幹蛟龍翔天霽開金粟秋髙對玉觴燕山傳勝事蟾窟散餘香欲倩騷人筆重書招隱章漏屋馮裕茅屋幾時雨棲遲欲斷魂青苔縈土壁流水出柴門懶隱烏皮几愁開緑酒尊晚來聊一望四野尚雲屯上大雲寺石存禮山險疑無路縈回一徑通鐘聲瀑布外塔影夕陽中忩出茶煙白爐分松火紅禪房招隱處清話幾人同前題劉澄甫寺隱青雲杪門當碧石隈自開西澗菊誰翦北山萊細雨曇花落危巖烏徑回上方清梵宇人世隔塵埃前題陳經披徑尋祗苑盤空躡白雲山門通上界石室藹清氛夜鉢看龍蛻秋巖識鹿羣還聞飄桂粟花雨共紛紛秋日有懷藍北泉馮裕昔年驄馬過山郭有光輝對酒邀明月尋詩歷翠微夜深還共坐春到便言歸好謝南征雁銜書向北飛前題陳經仙境懸東海髙人憶北泉地鄰蓬島日宅近蜃樓煙秋水蒹葭逺霜空鴻雁偏乘槎會何日藉草一談玄重修富公遺愛亭古廟千年圯靈臺不日成雲浮新棟宇苔洗舊碑銘惠澤存先哲儀型愧後生可憐仰止地徒有漫逰情又丞相祠堂舊今朝勝槩增冠裳秋水集羅綺暮雲層清醖薰蘭㵼芳肴雜桂蒸何人懷古意惻愴意難勝朝錯受經圖楊應奎經自伏生授言從玉女傳秦灰方冷後孔壁未開先文武存方䇿唐虞在簡編何人圖盛事仰止愧前賢牧牛石存禮有客西臯下力田還讀書東風春野緑朔雪夜忩虛芳草眠黃犢香藝走白魚倪寬千載後誰伴帶經鋤前題馮裕爾牛來濕濕牧事付村童細草三春雨疏煙一笛風寢訛青野外陟降夕陽中共喜維魚夢年年屢報豐夜坐石存禮空齋伴獨客寂寞似僧家爐冷頻燒葉燈昏不結花夜長思往事嵗晚惜年華不寐推忩坐茅簷月未斜前題馮裕永夜南軒坐依稀到夜分星晨旋北極河漢度流雲皓首栖蓬蓽孤忠想曝芹寒階聽鶴唳疑對玉宸君前題短燭頻移刻良宵不問更坐疑天籟息興與月華清晴漢星如減風林鳥誤驚那知車馬客緣底尚西征前題陳經金壺傾漏緩烏几倦更長數息疑禪定齋心學坐忘裘溫貂續短爐冷鴨添香問夜移衾枕山城月轉廊聞柝劉澄甫月明人語寂霜落柝聲寒斷續齋鈴雜清幽戍角殘金吾傳夜警玉漏送更闌羈旅愁無奈關城卧未安前題陳經霜風吹夜柝明月戍樓初閣逈連雲響山寒應谷虛嚴更疑漢署禁直誤周廬滄海孤城夕遙天憶帝居春寒東皇初布澤北海尚多寒凍水才分谷光風未轉瀾榆添新改火貂戀舊彈冠會見芳菲意融融獨倚闌人日野眺石存禮七日逢人好頻年望眼賖塞雲晴度雁城日曉翻鴉澌下先春水梅開隔嵗花居間何所事端坐誦南華早起馮裕山居常早起幽興曉全濃步屧披春草開簾度曉鐘亭亭留月色黯黯見山峯樵唱忽過徑朝暉透檻松前題劉澄甫在家無俗事早起意何如種樹滿荒徑移花向近閭間愁苦不寐短髮倦頻梳預約南溪老侵晨學釣魚前題陳經為惜韶光好尋芳欲及晨鏡中猶未老塵外且間身晞髮扶桑日披襟滄海春熙熙觀物候拂曙五雲新又春睡何曽著荒園幽事知斷雲饒種竹壘石曲通池招客嘗新酒科頭改舊詩適時惟老圃自笑學樊遲山行過僧菴不入石存禮曉起誰同步尋幽思不羣逢僧看竹去吹笛隔林聞山勢浮雲合溪流野水分徘徊歸晚徑樹影月紛紛前題陳經蘿徑盤青靄松門隱碧岑野雲看不極禪榻倦重尋樹斷浮幢影巖虛落磬音何須支遁話已覺淨塵心元夕聞讀書聲馮裕淑氣回新律風光轉上元千枝花照夜萬户月當門城角人家過書聲草屋繁杖藜聊佇立指點示兒孫海岱會集卷七
