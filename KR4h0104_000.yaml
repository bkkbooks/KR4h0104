body:
  text: 海岱㑹集目録總集類巻一古樂府六十三首巻二古樂府三十六首巻三五言古詩五十六首巻四五言古詩二十六首巻五七言古詩三十三首巻六五言律詩三十九首巻七五言律詩三十四首巻八五言律詩四十首巻九五言排律四首巻十七言律詩七十二首巻十一五言絶句詩三十首巻十二七言絶句詩三十八首臣等謹案海岱會集十二巻明石存禮藍田馮裕劉澄甫陳經黄卿劉淵甫楊應奎八人倡和之詩也存禮字敬夫號来山益都人𢎞治庚戌進士官至知府田字玉甫號北泉即墨人嘉靖癸未進士官至御史裕字伯順號閭山臨胊人正徳戊辰進士官至按察司副使澄甫字子静號山泉夀光人正徳戊辰進士官至布政司㕘議經字伯常號東渚益都人正徳甲戌進士官至兵部尚書卿字時庸號海亭益都人正徳戊辰進士官至布政司㕘政淵甫字子深號范泉澄甫之弟正徳庚午舉人應奎字文煥號澠谷益都人官至知府嘉靖乙未丙申間經以禮部侍郎丁憂里居田除名閒住淵甫未仕存禮等五人並致仕乃結詩社于北郭禪林後編輯所作成帙冠以長至日五月五日九月九日上巳日七月七日㑹集序五篇其詩凡古樂府二巻五言古詩二巻七言古詩一巻五言律詩三巻五言排律一巻七言律詩一巻五言絶句一巻七言絶句一巻計詩四百七十九首其編輯名氏原本未載惟巻首萬厯己亥魏允貞序稱友人馮用韞以海岱㑹集自逺寄至則出自臨朐馮氏家矣八人皆不以詩名而其詩皆清雅可觀無三楊臺閣之習亦無七子摹擬之弊其社約中有不許將會内詩詞傳播違者有罰一條葢山間林下自適性情不復以文壇名譽為事故不隨風氣為轉移而八人皆閒散之身自吟咏外無別事故互相推敲自少疵類其斐然可誦良亦有由矣乾隆四十六年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書海岱㑹集序夫子曰先進於禮樂野人也後進於禮樂君子也如用之則吾從先進舎君子從野人貞少日但耳解耳不知其真也及壯而仕於朝游四方而老見諸食飲衣飾器具拜揖稱謂間日新而月異一倡而羣和不知於野人君子何歸至其發為詩若文彌工彌下彌竒彌可厭長淫競靡標新示詭亂幾萌矣世安得治因念先進者當不然友人馮用韞一日以海岱㑹集自逺寄至讀一再而其對景言情即事屬辭質而葩逸而典清新而暢不矯不艷異乎今君子詩矣豈古昔所稱香山洛下者流與貞生也晚不及見其人而既聞其言矣不可知其人乎因為之説曰禮者嘉之㑹也詩者樂之變也海岱㑹集雖謂先進之禮樂可也後學者其審所從夫萬厯己亥夏六月朔日後學魏允貞書長至日海岱㑹集序嘉靖乙未日南至於是石子藍子二劉子黄子楊子馮子七子者相與㑹尋詩盟也厥旅維蔬厥飲維酤厥詠維詩賦蔬上酒行顧瞻雲物諸子咸樂閭山子乃言曰吾讀易至復未嘗不三復焉曰穆哉天地之化厥小大往来之幾吾於是觀焉象曰雷在地中復復者復也於時為陽反之象於人為徙之象諸子務日新者也乃今復也諸子其焉復哉於是范泉子賦羣龍喜諸陽浸長也閭山子曰有心乎致用也復哉復哉海亭子賦娛親時歸養也將以厚志篤倫也敦乎復者也山泉子賦時養時養者若時以自養也養静以利動也養隂以厚陽也以為政則昌以保身則强斯閉闗之道乎来山子賦考業曰吾樗散林麓二十餘年矣顧乃復事觚簡耶閭山子曰復休哉澠谷子賦尚友中行獨復勇哉楊子北泉子賦逺逰言不逺東海以彚征也其朋来无咎者耶閭山子乃賦倦飛曩者㝠行冈覺動觸機畢不逺之復吾愧未能也乃今得從諸君子逰以省吾過庻其免於大悔乎詩成俾童子歌之婉而不媚壯而不激宻而不弇閎而不肆其聲和其律諧其氣大以昌洋洋乎若聆黄鐘之音焉閭山子曰吾於復見天地之心吾於羣作見諸子之心嘉靖十四年十一月之吉閭山馮裕序五月五日海岱㑹集序蓋聞百川學海羣山宗岱渟珍峙秀溜媚藴輝瀛嶼風髙快鵬摶之九萬芝亭雲冷悵鶴駕之三千谿域無疆乾坤有定寳藏興焉材幹殖焉懸藜垂棘火齊夜光鯤鼇蛟鯨琳珉琅玕神草若木黄金丹砂蘭芷杜蘅梓柟豫章連城照乘之貴凌霄合抱之良不能獨當也是以磊落瓌琦光明俊偉之士產乎其間粤若二代監觀侈周公之禮樂六經述作富孔氏之文章營丘建邦太公鷹揚於東國即墨守土田單火縱於齊城魯連髙蹈以辭兼金王蠋捐生用全畫邑鮑叔之深知恩逾父母平仲之久敬義重友生三士悲歌于梁甫兩生耻赴于藻庭乗桴而知幾羨鴟夷之髙致擁琴而適趨慕稷丘之清風家家積隋侯之明珠人人抱荆山之璞玉古今為盛俯仰興懐然而見賢思齊是為尚友登髙作賦更有諸公遂盍簮于蓮社特講信于雞壇合志同方賞心樂事乃若來山之清癯並閭山而挺秀北泉之浩博與范泉以同流孤峯峭壁海亭仰之彌髙幽壑平川澠谷探之愈逺繆以山下出泉之䝉徒有河伯望洋之嘆三旬投散竭一日之幽歡百年命車寓七人之上列登龍有願附驥無能麗澤猶滯砥石安頼是月也時維仲夏律應蕤賓日交月諸斗午參横螳螂修斧伯勞發聲石榴夕艷木槿朝榮乾道之變化也節嗜止欲避暑頒氷羞桃烹鶩象徳封功朱索驅厲寳符辟兵聖人之與能也由是對時育物命侶呼童涓佳節際良辰擕桂酒雜椒漿坐落花以開宴疊角粽以侑觴長風送暑揺輕箑而御纖絺茂樹垂隂浮碧𤓰而沉丹李芳草鬪青掔氷簾於石澗蘭湯浴潔藉夏屋于雲門縷絳絲而繫臂趨吉避凶進昌陽以引年安身利用孫登之草裳隱不嫌于土窟羊茂之版榻貴不驕于專城仙侶神府日服𤣥冰之丸玉闗金宫夜聴秋霜之曲逍遥筦簟嘯傲山池弋雲飛之髙鳥釣波蕩之游鱗諸葛綸巾抱膝泰山之側管寧皂帽晞髪遼海之隂某水某邱一觴一咏樂天知命追古傷今用舍行藏尤増感慨形骸以外復誰可知芝蘭在傍覺我形穢雲巖石室樂帝舜之薰風蓬島天池沾皇明之化雨留連景暮邂逅詩成詞曰菖蒲萼緑榴花紅火雲障日山庭空蘭漿桂酒歌薰風佳辰令節心和同滄溟以西泰岱東羣公暇日忻相逢被髪酣暢封禪亭拍手笑傲蓬萊宫行復滄溟波揚塵幾更泰岱培塿平百年不渝金石盟子孫保之安無傾嘉靖十五年五月初五日山泉劉澄甫序九月九日海岱㑹集序重九髙秋日晶風淑麗澤諸友不速偕集一揖再茶坐無雜言迺各出所著古賦樂府古今詩相請相遜相諗評焉已迺進饌饌潔而無殽迺酌酒酒清而不多迺相議擬再作之題于雅于著于取義者焉蓋相遜也欿然相受也憮然相正也偲偲然相忘也怡怡然又作曰是維五隂之候而月九者陽數也日又如月之數焉陽健也昭也亨也君子用事重陽嫌隂也故重九之賞逖矣出觀于茱茰曰藥之良也物至時而後茂者鮮矣再觀于菊黄華沃若曰芳而不艷無競乎衆芳也何也暇而合其離㑹而游于藝弛而歸于張禮也故仰觀于時以勵志也俯感于物以興情也情志之慎詩之教也辭賦樂府皆古之流也為其言而弗若其教者蕩也抑嘗讀詩至板蕩諸篇悼其作者憂虞凛凛焉今吾優游容與于文于晏也夫非荷一人之慶之溥乎仰日月而不負其照臨雖在隱可也且古之君子歸于鄉也有為師為望之責焉兹舉也或將式之或且瞻之為瞻可及也為式則難矣言之弗畔之難也畔道而于已于人無弗蔽也矣不敏獲從斯游教益幸多敢弗黽勉辱次授簡則謹繹而有附焉嘉靖十五年秋九月九日海亭黄卿序上巳日海岱㑹集序齒徳相兼願入芝蘭之室朱青異染期歸道義之塲交得其道則千里同心擇匪其人則同室反面谷風之誚未免角弓之刺安逃古重素交有由然矣余取友于天下獨有得於郡中非鄙流俗之濫實慕賢達之興斯㑹也主㑹以長設饌有時酒惟暢懐詩各言志水陸之陳有戒蔬茗之供得宜無絲竹之亂耳無恐懼之寘懐敢矜長而諱短皆合志以推誠值上巳之辰屬良朋之約夫上巳者和風甫動甘雨初晴衆卉含英修條逞緑競逰溱洧之濵歴覽桑麻之野羽觴輕泛朱翠偶逢接軫連鏕曾知市藥之穩旁瞻驚拜須仗蕭艾之功亦不過快宴喜之私惜晷刻之運而巳勢利相眩孰不知有此樂哉矧我朋從潛消塵想升階叙坐分韻搆思裒帶峩冠更無拘束名山勝水皆合襟期喬松叢竹雖非曲水之觀宿釀新茗頗類蘭亭之雅洋洋然而來欣欣然而往衆稱佳㑹也文㑹固佳髙人可數更須借諛俱有鄉評石雖可轉来山臞體而雄心青出於藍北泉玉質而鐵面馮閭山之寛厚足比大馮黄海亭之通融可追叔度號伯起為夫子即澠谷之明經或後或先相伯相仲山泉賢者為兄范泉愚者為弟乃非晉世之龍徒羨河東之鳯曰官而官曰家而家兄則有之矣萃集名時宻親故舊有其志而無人遇其人而無地迹亦萍水情實鄉閭咸髙材疾足之英適解綬投簪之日頗因文字深寄衷膓尚友之㑹何如耶且公議莫掩良辰幾何近則正之逺則宗之流麗者尚法流麗清新者尚究清新典雅可求自知理趣温厚能入尋造精純喜忘懐合道之交有博物洽聞之助文章綴其枝葉徳行樹乎根本屈原輸忠揚雄頌莽咸奮舌而並作果匿瑕而同光若夫辭金折節脱黨全孤郭有道之人倫東國董仲舒之正誼西京曾專較其詞章姑指摘其心術君子入則篤行出則友賢斯之謂歟規勸有益盟約自堅能學為正人自發為正論寄身翰墨漸成篇籍豈坐雕蟲之名允為海岱之㑹應命作叙長者各有述云嘉靖十五年三月初九日范泉劉淵甫序七月七日海岱㑹集序蘭亭蓮社風流遺百代之芳洛下香山矩度傳千年之美鄉約質淳儀式具在吟壇陶寫意例多嚴髙蹤難擬繼軌遂尋世代固有後先人心可無今古盍簪載㑹斷金啟同心之利伐木詠詩麗澤求有益之朋稷下鴻儒素稱上智三齊人物夙號多賢矢書激義雄辨成家劍閣登刻知孟陽之藻思雕龍書就見劉勰之博識三都不亞於兩京中論何愧乎中説舉此以槩其餘難鳩獨行大節源源有人經術文章紛紛多士慨我輩之生既晚耳先達之風未湣乃依雞壇之盟共赴文㑹之招假梵宇之逺塵資厥曠僻定蔬食之真味禁其繁文設茗飲以沃心飛羽觴而醉量歲叙孟秋時當七夕金祇司候火曜方流積雨收而凉飈生浮雲散而晴日出芳林添翠嘉穀増實瞻彼南山白鶴來駐巋然寳殿青鳥遥臨方將曬腹内之書共約証河邊之駕凡我友耆並皆佳妙篤行石奮探禹穴而寄跡多學藍尹捋虎鬚以厲聲世襲衣冠之俊家傳豸繡之英詩書故里閥閲名門孝綽之聰穎元方難兄孝標之博達獻之佳弟可名雙鳯亦是二龍持憲而淮晉草靡山泉嚴威把麾而揚粤春生閭山慈惠馮唐難老黄霸多能每法叔度之汪度涵洪愧無得意之加意賞鑒產同青土散處海鄉期月一集不疏不數文言是讀無忮無求各攄胸藏之竒庸灑楮幅之麗作者之意情見乎詞醉翁之髙志不在酒雕蟲從事庶成書以成言撰述何勞蓋因文以見道千里神交徳星夜聚襟懐瀟散形迹不存意度優閒拘礙何有數載竒逢一時良㑹髙明耆舊俯就而切磋不忘謭薄疎庸攀仰而驅䇿實頼四座馨香咳唾頓成于珠玉廣筵雍穆談笑足騐乎經綸挽星斗於筆芒驅海濤于硯底變態多端風雲極其聚散巧姿殊狀月露挹其慘舒上瞻天漢之清淺細數烏鵲之飛翻入耳風鳴絃管弄隔牕鳥語唱歌聲竹林七逸事清談而入醉鄉雁塔羣仙矜曠蕩以臨花市豈若沉潛詩賦以養心是乃吟咏性情而寄興掇藝苑之菁華叙彞倫之純㫖手舞足蹈真欲駕輕鴻以翺翔志同道合殆將挾飛仙而長往律聴夜半之聲悟解琴中之趣論放逸不若東山語繩束難擬獨樂實生世之佳致真斯文之要歸廢墜興于不講豈是崇虚新竒舉于久缺非為離俗澠溪雲窟發潛曜以舒精西岱東溟吐靈氛而作氣盛集常茂流芳彌逺大書濃染各各翻録一通錦軸縹囊人人琛藏十襲東璧燦輝輝之彩南箕避燦燦之光授簡有倫檮昩猥及含毫叙事荒穢何堪敬疏小引以冠羣玉嘉靖十五年秋七月七日澠谷楊應奎序
