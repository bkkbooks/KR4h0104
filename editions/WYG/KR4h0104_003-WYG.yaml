body:
  text: 海岱㑹集巻三五言古詩黄金臺馮裕燕山髙嵳峩燕士多悲歌昭王黄金臺矯矯青雲阿屈身思致士禮意為網羅樂毅與劇辛千里皆相過意氣成風雲談笑開山河一朝失英主勲業如流波黄金不改色衆口一何多二城乃反覆一簣竟蹉跎悠悠國士心遺恨當如何詠懐世路何嶮巇散歩亦不展人生能幾時白日忽巳晚我欲騎赤虯陟彼蓬萊巘醉來問麻姑滄溟今深淺前題樲棘花如粟相近紅槿籬采采不可贈可贈不可持桑柘墻下植松桂山中移物理自有分堅貞勝華滋掃塲留粟粒為恐野鳥飢並生大塊中飲啄将同歸前題虞人養麑鹿童子養雛鸎飲啄非不厚豈適羽毛情林卧玩空翠墟落謝經營霞舒炫幽澹谿靜轉琮琤軒冕忽枉顧掃徑啟柴扄但禁犬出吠不知鷗巳驚始返志自定諒盡歲寒盟前題劉澄甫百襲寳燕石千金學屠龍其如敝帚價還知康瓠功時違貴者賤勢重拙者工西陂泛舟楫東臯事春農俯仰尚自得讀書日從容巳謝簿領勞頗守山林窮溪前䕃灌木屋後樹青松白鷗忽下來正堪對海翁又枯桐在錦囊藏之三千春白玉間瑶􅈿黄金斵朱紋月明一披拂悠然散埃塵有價不能售猶如隣女貧顔色豈不好絃歌非不新彼方惑嫫母徒使江妃嚬棄擲鼎作瓠鄭重艾為芸世事豈足道長歌激青雲前題黄卿南山杳青靄平野望岧嶤上有梧千尺離奇鬱干霄髙鳥凌風下結構十圍巢飲啄靜自足煙露養羽毛晴晦誰豫定漣漚時自消𤣥髮夜中變晨起空我勞又羽人攜玉管題我白雲居雲水自夙願今兹急菑畬東借養蠶譜西借相牛書聞占風雨好所願豈在餘野兕不厭食耕牛不厭癯逸豫復焜燿嘖嘖與我殊前題楊應奎青樓臨流水水流何濺濺上有愁思婦中有萬里船欲寄相思信捩柁捷如烟抱琴歌一曲知音有誰憐曲罷不忍續淚下如流泉夫婿樂新歡何時理斷絃又湯湯黄河水來自崑崘山萬折始東下迅流逐驚湍日夜奔赴海何時復西還龍門豈不險砥柱豈不艱泛泛中流楫遡洄良獨難過時終有悔乘勢稱明賢壮士中夜心感慨傷肺肝澠水田家馮裕好雨遍郊原禾麥忽漸長荷鋤勤耘耔新晴風亦爽西山逺峰青澠水層波響水邊緑樹深黄鸝鳴下上蠶老絲何長麥熟穗仍兩早晚夏税足村村歌擊壤又昨夜秋風清百穀滿原隰短䥥乆在手收穫一何亟築塲見蟻穴中心為惻惻茅屋四五間俯仰皆飽食牛犢下山來黄鷄亦在杙雪飛燒勞薪地爐夜不熄煨酒熱如湯呼童烹小鯽忽聞催科聲一犬吠籬側前題劉澄甫菖葉日巳緑杏花日巳白澠水春茫茫石田灌沙磧曉聞倉庚聲夜寧安枕席秉耒効躬畊買牛代僕力驅咤上東阡開墾及南陌水畊火斯耨春種秋及獲泄泄澤雉雊油油禾黍澤青青桑柘隂潝潝溪流碧婦子饁于畝老翁嬉于宅辛勤誰為恤豐登差可懌税薄官府清酒熟鄰友益帝力委不知田家聊自適又負郭但有田繞屋多植桑柔條吐新萼蠶蟻如針芒戴勝幾時降嬾婦弄月璫夜索絞細薄曉斧摧枯楊晝午蠶正飢日暮桑盈筐穉子哺雛戲隣女知我忙綺羅試麗服璧玉炫新妝三眠待老食一夕不能忘練成白雪絲織就黄金裳有珠豈充飽無襦難禦涼田家半苦樂欲問心茫茫前題黄卿楊栁墟落盡斜徑傍鳴湍芳蓀遶蓬蓽髙樹出炊烟南嶺忽微雨樵父扣柴闗稚子驅黄犢荆布適葵荃簷前積藥草桑下縛魚竿開柵放鷄鴨競啄紅􅖋灘丁男早輸税老翁有歡顔夕陽倒濁酒浩歌擊壤篇又鄉約咸禮遜坐石叙情親相誇禾黍茂復言子姓淳女莫改結束男莫厭耕耘麻池通緑水鷗鷺到衡門城郭燿錦綺機事奕局新芳艷念揺落馳驅有悲辛春秋共社祀竹筊祈土神上言風雨順下言官長仁俯仰同怡曠歲晏烹鷄豚前題劉淵甫停車入田家坐我澠水傍飲我春甕酒納我槐隂涼杖屨三兩翁相與談𠂻腸今年二麥少苦被飛蝗傷皷鑼互擊咶捕逐多奔忙近速官家租舊穀先空倉强留絹在軸欄内幾牛羊休除心内病且救眼前瘡日夜望禾黍不見禾黍黄入口無飽飯上身惟粗裳貧富有衣食誰願進公堂樂少苦時多數日思安康又田夫不生疾田婦不生妬兒女共嘻笑等閒少嗔怒五穀半收成四時多雨露身外何憂愁從容度朝暮編荆慣作扉繞屋更栽樹無事不入城愛向村中住偶爾招親朋歡顔好相遇正值黄鷄肥園圃伸薄具彼我俱真率荒涼有佳趣膏腴知難得朴實無他慕自然生善心終歲惟土務前題楊應奎我屋近南山我圃連滄洲田疇時雨足禾黍正油油閒歩看晴野偶然隨海鷗何期柴門下好客為我留盤俎無兼味瓦缶注黄流一斟復一酌賔主醉沉浮傲然天壤間坦率更何憂送客出門去北牕風颼颼五栁亦何人此意堪與儔又刈麥復種豆枯槎嫩芽長積雨荒草萊揮鋤去其莽縣胥催夏税東西號呼響斛麥輸官倉中心獨惘惘夜眠背始帖粥食亦安爽䇿杖看山雲野老共來徃相與話桑麻多言今勝曩貧者雖無食禾黍亦可仰歸來頌七月可以當擊壤幽居石存禮幽居近城府而無城府迹耕鑿樂歲時樵木共朝夕鳥啼芳樹深犬吠村巷僻乘閒或杖屨有酒邀隣客掃石奠盞斝藉草為茵席陶然忘外求所願非所適前題馮裕解綬二十載卜築此屋廬茅茨自翦伐歲月忽居諸石田八九畝榆栁三五株呼童課耕作植杖聊舒徐閒門白晝寂村中嘉客疎時有田夫飲曽勞長者車持竿惜黍禾驅雀登邱墟平生巧智絶但喜子孫愚細酌瓦缶酒慢摘荒園蔬涼颸動籬落安飽願無餘前題劉澄甫我屋對西山青溪臨北牖誰謂羲皇人自學䝉荘叟燕雀易帡幪鴻鵠爾何有長歌伐木詩輕擊種豆缶行玩溪上魚坐憩門前栁畦同漢隂灌耕與沮溺耦菽粟足朝夕圖書忻左右晚年好道術況復厭奔走黄庭朝玉極白齒緘金口蕭然塵外居税駕得衰朽前題黄卿素業出郊坰重揖幽棲廬桑麻宜土脉平疇便耕鋤渉澗玩清溜引溪滋園蔬雜芳間緑蓧石磴垂蘼蕪白雲沒巖岫蒼嵐忽有無四時絶氛雜樵木相招呼松葉釀秫酒野酌斷𤓰壺􅆐鹿狎羔犢白鳥集松梧優游逾臺榭十畝等江湖又夙愛滄洲濶歸來體力康茅茨預綯索薜蘿結垣牆奇石移當牖修竹植成行靜較養鶴訣博求术苓方宛宛素志友琴書在隣荘野徑恣迎訪嘯咏對藜牀探賞遍林壑登頓互扶将慮淡中如腴志寧日晷長門前撫􅀢鷺游衍莫相忘前題劉淵甫敞扉隔㕓市過徃無塵車旁人多笑僻吾獨守吾廬草色自青青當門不須鋤出門歩先懶延客髮纔梳不沽簾肆名即同巖穴居何以度歲時賴有古人書陋巷豈不足髙棟空有餘違世甘所終安常獨晏如又靜處非寂寞適巳即坦平少識敢絶交似野仍在城隂隨碧梧宻風動松柏聲雖無桃李繁頗覺蓬茅清琴招舞鶴至道為灌園成巳愧青雲姿多從白石生乆卜鄰翁好不為侯門營門外各有求世路徒縱横前題楊應奎卜築當郡城而我居獨幽深巷輪蹄逺小園樹木稠牆垣甃白石前街臨清流茅屋僅數楹圖書列四周牀上懸鳴琴古調莫能儔秋風颯然至披襟一坐酬眼前無長物竹菊三兩疇日午宻隂轉散髮詠公劉真樂在讀書日與聖賢游或時忘盥櫛巾服亦懶求但祝年穀登非為稻粱謀與友人野飲馮裕地僻塵埃淨幽居嘉樹林故人忽相過攜壺就清隂南溪瀉長湍西山出逺岑野花向我笑山鳥為我吟一觴間一詠觴盡還自斟相對無雜言蕭然獨鳴琴琴亦不在絃極目白雲深前題劉澄甫山林殘暑退尊罍髙晏初不願華屋醉但約野亭沽同心五六人興至命巾車出郭謝塵鞅列席俯厓隅石榻坐自叙水閣行相呼開襟對蘿薜登髙酌茱萸青山作屛障緑竹䕃庖厨折荷當杯杓聞鳥吹笙竽翠烹沼沚菜白煮溪澗魚引滿不用勸日暮歡有餘歎息時易邁放浪豈常俱細讀止酒詩陶令非區區前題黄卿登臨客不速相将歩郊原藉草諧嘉㑹匏樽采薇荃蟲鳴時序改既雨林芳鮮絳雲巻復舒羣山當目前拾薪烹鷄黍瓦釡支頽垣逺聞樵牧曲倚和白雲篇物儉跡自雅志洽物無牽晷移索杖屨中飲戒流連前題劉淵甫暮年寡儔匹郊設惟常饌良友對舉觴笑傲非荒晏語言合倫序巾服隨簡便我生知止足於世無歆羨行吟寧幾何物態忽催變雜花映瓦缶微風吹酡面北山不剪萊榮辱空交戰歸去命兒扶就中有真見止道士伐雲門山石劉澄甫澤居宜惜水巖居宜愛山天物豈可暴物理固其然道士逺方來結搆雲門巔钃屋亦奚為而使山石殘開山不種玉移石匪補天本意事耕稼胡乃專鑱刓碧嶂失顔色丹崖損巑岏吾将訴真宰願保貞堅全五丁鑿劍閣巨靈劈華巔道路雖日闢混沌恐不完從兹祝山靈永為䕶層巒三顧圖黄卿昔人重繪畫解寫髙人跡斯圖三雄姿一蛟兩虎貘凌空蹴山氣面帶憂時色山徑匿車徒中林收戈㦸蒼岡松桂叢衡茅卧龍宅名並渭濵隱才包管樂䇿奸雄耀百戰帝胄一何厄渴問渡海津獲假擎天力一顧阻煙霞再顧虗泉石三顧罄䖍恭掃廬愜迎覿坐談定鼎足慷慨分漢賊驅馳許致身魚水歡莫逆皎皎莘野聘洒落協真契兩将本迅烈宛宛同尊德魏呉多健夫俛首鷹犬食厯數有向背漢疆難再闢成敗論豪傑鉛鐵愈圭璧寥寥曠千載披軸三嘆息前題劉淵甫華封拜乘雲崆峒請順風聖帝及明王師士恒相同披圖想枉顧先主三曲躬疆域乆運籌禮貌宜尊崇不然孔明輩輕舍草廬中志定時有違食少事無窮真才天固縱炎祚運自終分鼎勢巳去卧龍谷遂空仲達怵遺烈出師表孤忠本愜髙祖墓豈比商山翁興敗難逆料遺像悲英雄謝安石遊東山圖劉澄甫吾生愛山水頗悉登臨興安石何為者獨占東山勝丹青殊好奇咫尺千里徑石頭若虎踞長江如練靚微茫煙氣浮杳靄雲霞映但見古寺宇不聞石鐘磬緑樹隱琴樽紅顔似歌詠彷彿世上仙沉湎酒中聖淡掃華嵓虗重抹金陵盛陽陂草木光隂厓巒壑瞑狂遊折屐齒清談麾麈柄遥指廊廟姿豈是山林性九原如可起蒼生今巳病初冬宿田舍馮裕滌塲忽孟冬白日壓西谷牛羊飽知還羣鳥投林木余本田間人合就田家宿主人出相迎白髮被野服空庭陳耒耜小案無簡牘不復知城市相對話耕牧且喜年甫登況復酒新熟佐酒有野蔬授餐惟豆粥禮意雖坦平語言頗諄復村犬夜不驚日髙睡猶熟桃源不可尋時就此茅屋前題劉澄甫十月日初吉祭掃歸塋麓山蹊未百里薄晚田舍宿入門見蒼松夾道滿修竹老翁出欵接童子相追逐黄雲禾登塲白煙草屯屋移席俯寒流開味羅野蔌霜枯蟹尚肥桑落酒應熟擊鮮收兔罝投竿啟魚簏持盃每勸酬淳雅甚可掬不覺情意洽但見話言凟諄復戒車徒殷勤慰僮僕犬吠明月上犢鳴霜檻伏清晨别主人長嘯出林谷身世浮雲空富貴鳥過目浩歌歸去來田園遂幽獨前題劉淵甫首冬罷田功野夫同棲息履寒趂晴旭茅廬亟修飭留憩近青山良夜轉閴寂隔溪聞昏鐘床上見促織微月稍流輝庭階澹生色焚柏煙相縈燒葉竈欲熄短擎讀南華倦即展茵簀拊枕魂夢安頓覺銷結習鷄鳴各營趨回首猶佇立海溢劉澄甫東方有靈海萬水咸朝宗委輸端不竭歸墟積難窮乾坤朝夕池日月升沉宫湯旱未云嗇堯水寧聞豐嘉靖丙申歲十月當孟冬海水忽簸揚夜半聲如鐘浮楂落碧漢若木捲飛蓬天呉發震怒陽侯爭長雄碣石濺漂沫鵬翼摶髙空側岸走黿鼉逺峰卧蛟龍斯民化魚鱉劫數嗟遭逢室家盡汨沒妻孥困蒿叢百里俱浩渺村落無遺蹤營窟尚無托何事共租庸誰能鎖支祈為我息颶風桑田如可變露禱迴蒼穹白髮馮裕去年一莖摘今年數莖白去年顔色好今年顔色老人生安得長青春喚歌貰酒休辭貧黑頭一白難再烏君不見秋草枯前題劉澄甫人見白髮憂我見白髮喜憂多勲業長喜遂室家邇想當初白時星星數莖起朝夕頻覽鏡拔鑷以未巳種種至華巔愛惜復修理返黑頓覺難從白得衰始悠悠思古人茫茫孰可擬二老歸周王四皓翼太子耼耳度函谷榮期樂桑梓出處本不同髮白一而巳吾也老無用所幸尚有齒終賈愧巳多廣受頗知止白髮如有神歲除謹當祀前題黄卿昔我視壯士垂素屢嘆惜晨梳見數莖憮憮憶頒白頭顱無零霜明鏡㸃鬒黑日月迅馳馭形質豈金石營營思無限辛疲兼憂戚大藥未可成鑷拔漫何益知哲諒同然㫖酒娯朝夕前題劉淵甫巳知老漸至不謂髮便白深藏亦何為欲變渾無䇿每為白髮嘆髮返向我責萬事隨逝波百年如過隙未來尚足待既徃空念昔如雲盛有時似雪竟何益從今復覽鏡自遣仍自釋中歲巳蹬蹭晚途省奔役謝僧惠茶老衲採山華碧茗樹方茁弱荄如剪韭長芽捲雀舌曉露徐挹潤晴旭暴復潔緘藏香積乆持贈意獨切滌鼎汲冽泉刈薪自煎熱悠然酌瓦鉢渴喉慰甘飶吟哦興轉豪煩囂遽清澈方外有賞音市飲徒餔啜施金轉恐俗答贈有薇蕨冬隂馮裕𤣥冬風怒號同雲四野起雪花萬里飛凍合滄溟水玉樓驚髙寒窮簷半生死曝背我無由何以獻天子過揚子江聞金山寺鐘楊應奎布帆江上來蒼茫問京口潮隨𤓰歩上船泊金山右海門月初出炯炯照髙牖澤國煙未滅蕭蕭映枯栁巉巖嵌招提虗空煥星斗僧去自鳴鐘客來且沽酒悠揚物外音杳藹雲中叩始疑老龍吟忽訝鯨魚吼老衲起晨炊漁郎候罟罶鍾陵霜落初姑蘇夜半後翻憶長樂宫衣裳遂奔走薄業豈足銘虗譽徒爾負明發戒征途天涯重囘首擬渉江采芙蓉馮裕渉江采芙蓉芙蓉花正開采之寄美人欲寄平生懐美人在白雲三年與我乖有恨不能飛日暮登崔嵬前題黄卿海州有靈藥兼之華茝芷我願采且擷結束寄知巳道路修且阻行行隔江水昔君遺素管拂拭常在几朗月瞻望同停雲空復爾豈無杯酒歡素心良如是擬明月何皎皎馮裕明月何皎皎四壁蟲聲悲良人别三秋夜夜夢清輝忽覺不相見披衣倚雙扉南來雁行多何以音書稀願逐雙黄鳥凌風奮翅飛擬古三首東方有扶桑盤踞幾千里枝葉拂紅日根入滄溟底仙遊十二洲鶴馭時一止日月忽徃來脉脉無終始美人隔湘江寄我一書緘情意殊委曲字畫復嬋娟藏之懐袖中時時一披閲人生非金石能堪幾迴别秋風入孤櫺疎窓見明月梧桐在朝陽雝雝鳳凰鳴神龍騰碧海靄靄濃雲升上有堯舜君臯夔列明庭寄語悠悠者洗耳難為名擬西北有髙樓黄卿北望鬱峻極層閣薄青冥飛甍接山杪簾箔凝明星臺陛不可躡杳然朱絃聲一鼓涼思起轉奏微霜零倐疑素女調轉傷扊扅情悠悠度縹緲願言徹泰清音節何足異感慨極平生終當招鴻鵠翩翩翔滄溟前題劉澄甫西北有髙樓岌嶪接閶闔森森虎豹維隱隱虬龍窟沉沉九重深茫茫萬里濶大明麗崇霄浮雲忽闇曶白虹貫非常欃槍出為孽雖錬五色石疇能補天闕力開衡山雲莫解明主惑直道罔不黜俛首三嘆息擬青青陵上柏黄卿營營花上蜂栩栩園中蝶浮生巳多勤爾亦競時節日馭西赴急同願樂耆耋良時坐朗暉不遊空自潔名城多貴介樓閣何岌嶪寳馬遍坊郭㑹晏羅醇飶盤桓盡歲華豈復知愁絶慷慨自無當硜硜哂疎拙擬今日良宴㑹今我何不樂良朋自相招園蔬滌清沼瓦罍開醇醪中席忽擊筑客起吹洞簫賞音握我手㑹意豈歌謡逺眺指仙島仰視杳丹霄誰言羽翰捷踟蹰對蓬蒿海岱㑹集巻三
