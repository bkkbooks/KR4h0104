body:
  text: 海岱㑹集巻四五言古詩過邯鄲訪盧生夢處劉澄甫閲世若談夢全形如繫風蕉鹿互得失柯蟻僭王封髙人喜曠達志士推豪雄伏讀枕中記隠顯頃刻終狂歌天姥吟出入烟霞重偶行邯鄲道下馬尋遺蹤棟宇半漫漶草樹揺蒨葱盧生睡未醒吕翁何可逢路隅沽濁醪一醉逰洪濛軒轅樂華胥文王徴非熊䝉叟竟為蝶丁固乃生松轉覺夢中夢寜知空外空徘徊弗能去悵望西山峯前題楊應奎邯山紆嵸巃叢臺夾疎栁茅店古城邊荒堞帶虚牖昔聞黄梁館寂寞千載後盧生風火腸一枕遽囬首世縁本幻寐浮生漫奔走不見平原客馳躍誰能乆至人未易逢賴兹傳不朽土人有深意建祠當道右遺像瞻清虚悵然厭紛糾感慨夢中人無聊對尊酒聽海山談三山馮裕我行倦扳登華樓卧明月時有緑髪翁相期採薇蕨顧我發㣲哂清風振林樾坐談三神山海上留真窟蓬莱髙嵯峨方壷燦銀闕瀛洲何茫茫弱水𣺌難越聞言動深省自審非仙骨俯爾學清虚澹然忘干謁天鷄聞扶桑興至欲乘筏倘逢安期生因之泛溟渤客去不成寐悵望待明發石門石存禮杖屨從所適愛此石門行川原斂飛雨佳木當春榮興言磐石間坐看雲氣生徘徊日將夕山水有餘清前題馮裕初夏逰石門杖藜緣蘿徑遥遥見招提卓午殿中磬峭壁挿半天流泉滿清聽斜陽下西淵山中倐巳暝月出照崖松狂歌谷相應老僧無一言但採松花贈又亭亭石門山隂隂蔽丘壑泉流髙下洞壁倚虚危閣喬松翠重叠野花委紅萼日午嵐氣開夕陽佳景薄鐘磬杳梵宇車馬逺城郭若許幽人棲不負老僧諾樹杪坐青雲尊前招白鶴石床到即眠甕牖無待鑿月出神愈清山空心亦濶谷口懐子真歸與甘淡薄前題黄卿石門闢如懸望望數石磴雨度風日淑麓轉薜蘿徑夾嶺對蒼蔚後嶂如倚凭峻極碍晴旭生雲或隠暝盤據古蘭若林樾聞鐘磬方龕無斧鑿一竅㵼潾㼆削壁饒松栢層層互樛牚散歩賞未足留憇待僧定灔灔波浮月林光掩飛映何當呼良繪摸擬恐未稱履幽輕華扉得竒等寤醒予自耽遁棲同逰多逸興臨發促深巵磐石紛留詠浴蠶楊應奎謀生有常理畊桑衣食源豈能静無事而乃卧髙軒新春整舊貫農事已堪敦條桑滿絲阡歸室蠶正䌓浴罷紛成箔露葉碎供飱苦心探凉燠庶得慰朝昏閒下茅簷下對花且開尊但願絲穀登辛勤何足言古意馮裕鯤魚化為鵬搏蕩九萬里朝刷北海湄暮宿南溟涘世局未能容道大不可毁囬頭笑斥鷃寕與爾輩比嗟我孔與孟所如曷多訾臨流或問津出晝但隠几安常而保身若時以為理悠悠千載間出處有遺軌前題劉澄甫穆滿馭八駿瑶池宴萬里神禹坐卑宫光隂惜分晷奢儉肇興亡由來多伏倚鎬京天子逰細栁將軍壘寒暑困征役日夜苦瘡痏居者憶翠華國士讓黄綺懸思千載前聖賢道或否龍逢何剖心屈原竟投水堯舜倘在上巢由甘洗耳感遇卧幽壑嘆息吾老矣靈巖寺仙刻黄卿岱隂標名勝古刹開秘蹟聞昔巨鶴棲岩洞有題刻孤亭覽峯巒伊誰移斯壁蜿蜒紫姑書復似倉頡畫壯士擲戈劍鷙隼舒羽翼烟藤維喬柯寒崖蟄虺蜴僧言毛中書留宿臨兹石人間自好竒紛紛逺登陟青山須呵䕶風雨恐滅跡懐管寜楊應奎㓜安青雲士非時效泥蟠同志乃定交割席凜氷寒倐然逺汙濁逾海障狂瀾千載仰斯人逸駕不可攀殘菊劉澄甫九日節序佳白雁來賔候十月霜氣濃黄菊離披瘦落英真可餐殘枝為誰秀采采未盈把蕭蕭豈堪嗅漠漠鳥下巢藹藹雲入岫虚對南山松恐負東籬叟白衣不見至空庭徒搔首前題陳經離離黄金花珊珊碧玉蘭秋風花正開秋霜花始殘餘香竟不滅落英亦可餐服以延修齡佩以比幽蘭至性含純和嚴凝何足嘆願言崇愛䕶從今保嵗寒適意徒歌逍遥曲散歩舊田廬仕宦如倦旅風波浩歸歟農夫樂嵗稔園人滋新蔬花竹滿幽徑鷄鴨啄前除山茗及春採黍酒連甕儲三川聚巨賈京市鳴笙竽南有下灘船北有下坂輿鵬鳶在霄漢鶉雀止搶榆隣有炙背叟卑論乃起予委懐兹咫尺宿願詎無餘又人生貴適意所樂在閒居春雨但種藥秋江時釣魚同社南山老明牕讀道書萬鍾不足慕一飽願無餘門有鳥雀羅巷無卿相車白茅覆破屋黄葉摘新蔬陶潛醉兀兀莊周夢蘧蘧曽識無何有翛然返太初又髙陵變深谷桑田生白波千年河一清百嵗能幾何頺顔不再頳鬒髪忽以皤人生貴適意富貴安足多詩酒聊自娱親友日相過我歌聲金石我舞形婆娑至樂在性情非必綺與羅長安多豪俠甲第鬱嵯峨南隣吹笙竽北里鳴絃歌卜夜以繼晝流連若懸河猶云日不足春風顔未酡嗟嗟乾没輩遲暮空蹉跎杜古狂伊尹耕莘圖陳經阿衡誰物色傴僂耕有莘天命一代佐龍徳寜乆淪朝為南畆叟暮作元勲臣昔當秉耒時豈殊山野民一朝應聘出四海咸更新乾坤一開闢率土絶荆榛君民為堯舜風俗還樸淳茫茫宇宙間躬耕豈乏人雷雲空瑰竒胼胝徒苦辛不然千萬祀胡為寫其真又時盛巖穴空俊乂集京國國門有散人長懐咸一徳不盡伐商圖獨貌莘野蹟耒耜古制殊幘服今未識優㳺獨樂容左右墳典䇿畎畆有餘資桀湯孰休戚商廷亟聘徴吾道豈終寂滄海有靈隠雷起播膏澤寄言今薦賢慎勿按圖索孟嘗君淘米澗陳經廣固城西隅遥見孟嘗居云有淘米澗養士三千餘周東世板蕩舊都成丘墟所養刀劍客强半雜屠沽鳯凰飽琅玕鷄豚甘蝍蛆天馬厭龍芻芻棧非所圖西伯善養老鷹揚奮海區醴酒椘不設穆生歸田廬聖賢貴大節君子不虛拘所以田公子徒釣養士譽徘徊古澗間日暮空踟蹰天津觀潮天津一巨壑渤澥通滄溟北跨青丘小東接丹穴平尾閭泄不虛萬川歸不盈四極杳無際滉瀁浮太清天吴無恬波朝夕揚泙渹潮來雪山立潮迴奔雷轟乘桴尼父嗟望洋莊叟情一顧壯心魄瞬息悲吾生願言羿弓射安流無怒驚甘淵浴白日扶木撑青㝠遹觀干戈輯無復東南傾送黄海亭適江右馮裕東方有髙士結亭在海野優㳺二十年所志惟大雅翻然謁帝庭上䇿擬董賈宦跡遍四方琴書随匹馬忽賦歸去來洋溪結詩社風月共謳吟時時飛玉斝謝安棲東山清朝誰肯舍西江紫薇堂好雨當春灑我贈海亭行衷素應傾寫滄海足大觀還當歸善下放言南華有真人大隠濠梁邊虛襟涵八荒白眼望青天粃糠擬堯舜瞬息齊殤籛秋水到北海河伯不敢前紛紛百家語争似逍遥篇稽首拜下風悠悠千萬年送陳東渚北上皎皎東渚翁立朝三十載蓼莪起秋風歸來棲北海一從援琴後野叟日相待遨逰淄渑濵白蘋共采采珠林結詩社雲烟慚對壘女蘿附蒼松南山何磊磊春花與秋月對酒殊樂愷虞廷咨䕫龍徴書貤光彩四牡發齊郊我心惄如餒别筵倒清樽芹羹間魚醢郵亭薫風長葵花正蓓蕾願言傾此心皓首以不改夏日山中訪隠士石存禮治世有隠淪幽居出塵境逍遥塵外心駘蕩山中景時豐官税輸野曠人迹屛雨晴農事餘禾苗綠成頃俯仰堪輿間安閒乃天幸曉來門尚闗鳥啼夢初醒客至啟南軒坐消白晝永遺編共討論㣲言發深省髙林暑氣無清風襲衣冷盤桓興未䦨夕陽下西嶺秋意草蟲堦下鳴聽乆猶未歇掩巻坐泬寥秋聲振林樾人生無幾何為樂不可輟風吹浮雲開送我半牕月逍遥歩前庭孤螢自明滅海岱㑹集巻四
