body:
  text: 海岱㑹集卷十七言律詩登潼關望河馮裕獨上重城思渺然黃河如帶接秦川險周三輔疑無地勢逼雙峯却近天函谷牛來聞道日華山馬散偃戈年關河百二今猶在萬里常清紫塞烟杏村酒帘石存禮春在山巔與水涯酒旗深巷有人家也知物態隨時序但惜年光改鬢華落日踈林低度鳥東風平野亂飛花晚來扶醉長歌去馬首殘烟㸃暮鴉除夕劉澄甫今夕何夕嵗華盡明日明年淑氣回坐惜寒梅銷臘雪起沾膏雨灑春臺蕭蕭白髮新仍故落落窮愁去復來綺席忽開東舍竹衡門髙詠北山萊前題劉淵甫蕭然燈燭共誰親芋栗幽居且耐貧相對妻孥猶送臘起看星斗忽迎春百年入眼同今夕萬事勞形總未真不向天涯悲寄旅浮沉常作故園人元日黃卿海國東風暖復輕天雞迎日報新正兒童解逐斑衣舞兄弟相依柏酒傾半夜笙簫聞碧落萬家烟火啓嚴城野人惟有豐年望先指農祥淑氣生人日石存禮人迎人日嵗迎申和氣祥風遍八垠萬井笙歌歡動地九階燈火慶逢辰白頭濫與香山㑹素節寧甘菽水貧尤有丹心依日月肯教寒谷不生春前題馮裕正月七日好天氣南山映日騰嵐光野客共傳柏葉酒麗人爭學梅花粧小橋氷泮響流水古隄風暖柔垂楊老來不解遺綵勝祗覺菜羮滋味長春雨劉澄甫霏微輕雨寂無聲杳靄青山暗有情風轉蕙蘭光冉冉香添桃李秀盈盈愁空臘雪甘貧病喜接春雲妬晚晴茅店酒帘喧社鼓杖藜隨處問清明苦熱石存禮汗背天街馬上行葛衣誰說著來輕風微團扇難為力月伴空庭坐到明玉檻桐枝陰欲上銀塘蓮葉露初盈清涼却憶江南路兩岸蒹葭秋水生書院松濤楊應奎精舍隂隂萬木稠隔墻遙望翠雲浮波濤終夜驚成拍風雨連朝聽不休徑氣偶同天籟發潮音應傍海門悠空齊得此消岑寂一榻冷然爽若秋劈峯夕照劉澄甫秦帝鞭山走六丁巨靈雙掌破青冥危峯巀嶪窺滄海返照微茫落翠屏圖畫向誰開晚障乾坤留此結茅亭十年耽爾成真隱不必移文問勒銘富亭遺愛劉澄甫青社風流憶富公山川詩酒日融融春耕問俗雲門下秋水觀濤石澗中半榻氷簾飛碎玉幾株棠樹落疏紅荒亭故老談遺愛牧唱樵歌感慨同海樓秋月馮裕獨上髙樓望海洋娟娟纎月出東方六鼇仙跡疑虛幻一雁秋聲正杳茫光溢桂輪連蜃氣影浮蓬闕動霓裳夜闌徙倚忘歸去銀漢西垂清露凉花林野趣劉淵甫碧水青山何處村百花千樹半柴門山藏栁市無車馬水隔桃源有子孫問舍地偏為得計尋芳心逺遂忘言悠然逈出塵囂外垂老猶矜興味存雨後試牛耕馮裕雨晴原隰正勻勻農事今年又一新聞鳥每驚林外曙試牛先破隴頭春青郊潤色還通海洋水田間却似豳良耜好音應有續欲將椽筆倩詩人中秋對月石存禮桂花秋月兩同開素魄天香入酒杯幾㸃青山當檻落半簾清吹拂衣來追思王子登緱嶺擬訪安期到越臺引領十洲方丈近五雲隱隱護蓬萊澗泉濯足馮裕雨晴雁過覺新秋載酒西郊試一逰即擬褰裳來碧澗漫同濯足向清流岸髙松老一聲鶴風動萍開幾㸃鷗忽見白雲生腳底赤松應伴老滄洲石床劉澄甫幽人髙卧石為床興在蒹葭水一方但共野雲巖際宿不隨蝴蝶夢中狂枕流洞口蒼苔淨挂席門前薜荔香惟有青山足屏障何妨白日到羲皇藥圃劉澄甫老圃新開芍藥闌傍山臨水足盤桓縈青繚白山先逺帶雨梳雲水氣寒佳客淹留供逸興老夫珍重寄餘歡衡門也得消殘嵗嫩蕊陳根並可餐謁王沂公墓楊應奎前朝人物繫鄉思勳業功名世所推下馬西風傷往事卧麟髙冢慘當時白楊裊裊吟霜葉蒼蘚斑斑㸃舊碑立志誰能忘溫飽孤墳瞻拜一凄其山行劉澄甫出郭行行到處山春流泯泯鳥關關孤霞逺映晴川逈小洞幽含白晝閒為愛嵐光遲逺眺却羞花信對衰顔流連晚坐西峯下倚杖瞻雲獨往還前題馮裕䇿杖南山幾日行石田亦自有人耕逺尋碧障三千尺薄采瑶華四五莖瀑布飛來龍洞杳松雲散盡雀巢輕何當子晉來相訪共向峯頭弄玉笙雨中對菊馮裕節過重陽三四日東籬更對黃金花滿天風雨久蕭索一莖霜霧時欹斜寒操頓移心獨苦白衣不至酒須賖醉來百事都忘却好是柴桑處士家山中有懷寄知己黃卿石屋依樵劚始成忘機猿鹿解相迎重名不羡陶𢎞景多事還輸向子平招鶴獨穿幽竹徑彈琴時聽細泉聲舊逰悵望征鴻逺欲寄白雲百感生冬日過范泉精舍馮裕畫靣青山一畝宫霜紅菊徑細泉通土階剩見藤蘿月石井徐來松竹風盡日讀書應自得閉門覔句許誰工黃柑紫蟹葡萄酒常對清狂鶴髮翁盧溝橋劉澄甫盧溝南下水湯湯萬石嵯峨白玉梁地窟黿鼉驚出沒海津雈葦接微茫雞鳴上谷寒雲暗月落西山曉色蒼冠蓋往來詞賦客有誰題柱獻長楊前題黃卿黃金臺畔卧虹橋神宇經營壯聖朝薄海梯航通萬國經年車馬徹中宵山開雪石孤標峻河愛風濤衆壑遙正是邦畿全盛日兩街樓館沸笙簫冬夜聞琴沉沉道院冷侵衣有客鳴琴傍翠微古調悠揚𤣥鶴舞新聲寥亮白雲飛知音應是慚鍾子得意何須嘆楚妃彈罷夜深人不見海天寒月下漁磯獨酌石存禮山樽得酒且髙歌百嵗流光一夢過病眼看書真處少老懷追事謬時多髮隨落葉驚飛絮門掩蒼苔惜逝波今古英雄只如此浮生不飲欲如何禪房劉澄甫蘭若初開祗樹林僧房花竹自蕭森曉堂雲散忘機事夜鉢龍蟠見道心絶澗忩臨千尺雪孤峯門掩一床琴客來欲問維摩詰默坐無言海陸沉觀獵石存禮杖藜曉出郡城東校獵咸觀騎射同一路行雲隨去馬半空蜚鳥避彎弓川原路盡重圍合笳鼓聲髙落照紅共羡長楊能獻賦相如久已讓才雄冬夜聞雨寒夜沉沉轉二更忽聞凍雨起飛聲斜飄天上松濤細亂灑庭前竹葉鳴投老祗應眠海曲避人曽不到山城曉鐘欲斷寒仍甚滴盡空階夢未成苔錢劉澄甫霏微細雨落花鮮亂㸃蒼苔積翠連竹徑豈貪金作埒茅茨真喜碧如錢兔園鋪錦璇臺潤梁苑分香畫閣妍爭似野夫門自掩飽看秀色老林泉催海棠未開陳經東風小圃海棠新蓓蕾相看色漸勻半吐似迎三月雨欲開猶惜一分春輕寒薄霧休相妬舞蝶逰蜂未可親誰謂含愁獨不笑幾回移酒問花神至日寺中小集劉澄甫往時至日集朝天今嵗山城野興偏鐘鼓悠悠連上界松篁寂寂映青蓮𤣥雲回朔爭新律白雪知時定有年擬向旃檀盟舊業請歌賔主戒初筵臘日黃卿嘉平冉冉收殘嵗髙㑹依依復上方晴濶郊原紛較獵午深臺殿罷焚香山人獨憶豳氷晚鄉俗空傳魯蠟狂無耐三農仍望雪日融雲白轉堪傷雲門絶頂新構小亭石存禮江漢遨逰興渺漫雲門絶頂始躋攀小亭飛構當今日髙閣宏開壯此山寒繞石闌烟靄外靜看岩穴斗牛間恐驚太史占星象一醉乘風跨鶴還東池泛舟馮裕東城城下有蓮池小艇移來即渼陂野老看人隨岸轉奚童送酒度沙遲風恬帆外來山色日暮檣邊雪藕絲欲約仙人蓬島去海天寥廓碧雲垂逰石子澗訪西澗不遇劉澄甫西澗原頭訪隱君柴門寂寂閉秋雲采芝徑逺迷幽壑看竹庭空待夕曛流水新萍鷗并下野林芳草鹿成羣踽凉獨步行歌徹悵望孤村落葉分秋夜觀天漢陳經清秋獨夜露沾衣耿耿銀河徹地輝斜度層城寒不濕靜臨丹闕曉還微玉陂色借姮娥魄素錦文成織女機自有乘槎問津者何須竟夜仰雲扉霜葉白雁南飛秋信來清霜昨夜到齊臺滿林紅葉水相映一帶青山花又開石徑橫斜聊倚杖錦雲縹眇且銜杯飄零處處榮華盡為認寒枝待落梅鸚鵡萬里何年西入秦翛翛毛羽尚鮮新祗緣慧巧偏憐汝始信榮華解誤身縧鏇夢回朱户夜鄉園心繞玉關春何當解脫雕籠去霄漢孤飛莫近人椿桂堂陳經海上仙家雲樹長滿庭椿桂鬱青蒼靈根近接瀛洲境金粟常流月窟香蟠木叢叢應並夀若華灼灼與同光時人未識馮唐宅却擬燕山竇十郎山行田家歇馬馮裕雨霽山行石徑斜亂山盡處有田家輕雲冉冉浮孤嶂流水悠悠過落花炊黍蒸藜催午餉蒼藤古木閲年華青芻一束供羸馬歸路溪邊踏暖沙觀耆英繪圖黃卿誰貌升平夀域春百年絹素􅌂如新清流四海衣冠㑹白首三朝社稷臣山水絃觴同笑詠松筠鸞鶴想丰神詞林盛說蘭亭集蓬島瑶池此近真前題陳經今昔耆英傳盛㑹丹青肖貌寫良工龎眉皓首烟霞共花下尊前杖屨同身世太平思往事衣冠晚節有遺風于今林藪堪招隱豈少青山似洛中初夏登郡城樓望宿麥開花雨霽風暄正麥秋層城引望更登樓含金遍野黃初見舞浪排空翠欲流萬頃膏腴回斥鹵兩岐歌誦滿甌簍年豐道泰原相屬暇日重銷賦客憂幽居初夏雨霽馮裕四月村居新雨晴短墻斜日明朱櫻千里逺嶂帶雲出百道飛泉衝澗鳴苔徑看花蝶㸃㸃石橋攀栁鳥嚶嚶遲回山月到原上濁酒呼來添巨觥前題陳經夏木隂森䕃草堂山原霽色淨羣芳修篁籜解千尋碧紅葉翻階百和香錦席玉杯催短詠薰風長日送微凉習池興味虛堪擬一醉真成河朔狂晚坐露坐庭空納晚凉青山落日樹蒼蒼東樓角起孤城近北斗星回子夜長心事百年惟捧檄功名白首尚含香居閒未是嗟遲暮短景頻催暗自傷前題劉淵甫山中無事度年華獨坐踈簾竹影斜偶向松梢看落日又從山際數歸鴉據床寂寂聽鄰笛待月遲遲出水涯但喜暫離塵俗事欲除孤悶且烹茶梨花酒春酒梨花一色香對花呼酒坐茅堂連珠初壓槽頭滴注玉才浮盞內光擬放孤懷攀媚景轉看雙鬢著新霜臘封菊釀能相並傲岸何妨醉後狂階除插葦種瓜石存禮喜君未老得投簪瓜圃桑田遂賞心雨後杖藜隨鶴步秋來傍菊聽蛩吟醉呼新釀床頭酒趣在無絃月下琴我亦平生樂閒靜柴車何日許重尋牧笛馮裕春草萋萋遍石溪牛羊飽後下來遲牧童獨對斜陽立短笛時將隔隴吹曲盡山空雲縹眇聲回天逺雁參差林泉賸有逍遙叟一度聽來一解頤半山亭劉淵甫名亭積翠通幽境峭壁隂崖掩夕暉夜語似疑山鬼聽晝閒惟見海鷗飛門當澗壑流清響空落雲霞動草衣松桂薜蘿招隱去逍遙塵外竟忘歸前題陳經海畔孤亭倚翠微丹崖蒼壁四重圍蛟龍鬬雨時窺榻虎豹從風夜守扉半老樹懸巖户出無心雲繞石闌飛空山闃寂誰來去獨有幽人解息機暑夜微凉集東渚第黃卿炎天詩社尚尋盟鳴雨新堂太劇清坐閲芳蘭扶檻色起臨修竹滿簷聲茗香氷碗觥籌靜綺席風簾劍履輕凉夕含毫催四韻陽春相對愧難成前題劉淵甫髙㑹羣登燕翼堂尋常誰識靜中忙苦逢溽暑冠裳重喜送薰風几席凉老友自能追孺子主人真謂到羲皇劇談縱酒同河朔移坐傳杯對夕陽暑雨微凉㑹中諸友見過陳經積雨新凉起緑苔一尊長晝草堂開德星早卜賢人聚窮巷歡迎長者來濁酒慚無千日醉好詩真有片雲催羣公風雅仍多暇薄暮淹留未擬回又九夏愁拌舊酒杯一尊特為故人開喧聲忽送長雷繞爽氣新從細雨來下榻盡延徐孺客賦詩深愧孔璋才更憐風雅論文飲莫謾流連避暑猜乳燕曉日晴暉藹畫堂舊巢燕子出雕梁窺人似欲留新語矯翼那能戀故鄉雲翥豈無鴻鵠志泥銜應帶碧芹香主恩未盡開簾意去住遲回不忍忘牛山秋望石存禮孤城宿雨晚來收又向牛山瞰晚秋澗樹縹紅初著色嶺雲凝黛尚含愁青年早被浮名誤白髮仍為卒嵗謀世祿無窮身有限浮生擾擾幾時休出山亭劉澄甫翦落桐枝見逺汀愛山亭築出山亭雲峯獨立當忩碧劈岫雙瞻入座青石榻宵閒烟漠漠秋簾暮捲雨溟溟草𤣥自擬揚雄宅閉閣兼傳劉向經前題陳經山畔孤亭對郭開林踈秋靜碧崔嵬憑軒翠壁雲舒卷倚杖青天鶴往回咫尺西南連泰岱逶迤東北是蓬萊即看青鳥盤盤下便有仙人玉舄來九日菊未開石存禮風雨重陽已近時始移叢菊向東籬莫言徴士歸來早只怪黃花開較遲獨賞不煩人送酒急催猶賴我題詩江空木落心知少再結交盟更有期前題陳經籬落亭亭菊未黃秋清此日負重陽嵗寒氷雪甘真隱晚節風塵恥艷妝青女幾回含玉露花神何意惜瓊芳臨風欲嗅馨香立徙倚闌干索酒嘗霜後雞冠花玉露零零百卉殘芳叢馥馥透踈欄絳英的皪擎霜重緑葉翩翻報曉寒不數汝陽朱槿帽堪同門下鵕䴊冠也知五德標名久得近黃花晚節看雪中望劈峯楊應奎劈嶺髙寒插劍鋩晚晴遙望失蒼蒼千層華蓋從天下九疊屛風帶雪張影落平蕪青黛掩秀分南極白雲長他年五老能招隱便結松巢跨石梁鶴骨笛陳經胎禽羽化幾千年蛻骨猶堪律吕傳幽夢似悲長脛斷瘦形仍比緑筠堅香縹𤣥圃梅花冷春入青田楊栁偏莫是曲中向人語五雲誰識令威仙古塔鸛巢馮裕雙鸛春來巢古塔逺看疑是在青霄風烟繚繞時冥晦户牖綢繆不動搖哺子也應同鴶鵴繫苕原自笑鷦鷯欲將此義獻天子氛祲千年暗裏消寄澶淵李後菴劉澄甫十年征戍落江湘百粵心旌轉故鄉漢帝有時徴賈誼梁園此日釋鄒陽澶淵鷗鳥盟猶在海岱棠隂念不忘忽見賔鴻問消息幾番書札待南荒家釀美甚牡丹新開醉中自贈東風寒峭掩山堂睡起南忩野興長村甕試篘矜酒聖家園初發重花王獨持翠斚愁應破更折芳枝喜欲狂日暮自歌還自醉不知夢鹿與亡羊海岱㑹集卷十
