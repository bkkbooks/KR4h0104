body:
  text: 海岱㑹集卷五七言古詩觀獵黃卿長風吹林原野濶淺雪出草晴漠漠峱山射手紛較獵雙弧飛鞚攜繒繳老鷹半空躍䎘䎘健犬起立復蹲縮狐駭兔蹶澤雉藏四馳斜路穿叢谷兒童狂呼滿山阿白髮舊捋偶相過須臾瀝血積獲多文皮錦翼細馬䭾五陵俠少膽氣粗邯鄲騮駿騁通衢我言驍健須壯圖何不往射虎與貙瑣瑣肉食焉有無文丞相祠馮裕文公昔嘆巡逺忠今人凜凜更稱公唐家中厄宋季葉徑草不折悲霜風嶮巇濤浪屢傾覆楚國南冠日痛哭七尺甘為社稷死寸心尚冀中原復髙皇蕩寇公魂安崇堂爼豆朝衣冠祠廟千秋杜宇泣階墀百尺杉松寒天青日白拜祠下肅如有風動屋瓦龍鯨矯矯想像難獨有一言建祠者宋多節義昔無儔偕公勤王皆英流讓生爭死趙與劉何不配食此江頭夢逰勞山昔聞人說勞山髙巉巉萬仭摩層霄卓午茅齊正髙卧倣佛仙杖隨盧敖長風吹衣度海水玉樓瓊閣重雲起萬壑千岩朗不迷名花竒藥紛相似坐對獅石窺龍巖長䕨百尺垂松杉靈風蕭蕭飄玉瑟瀑布細細開珠簾逢萌幽棲如可覩竹解成龍杏伏虎仙人獨坐玉虛岩恍若目成不相語欲語不語凌太空海東片片丹霞紅倐忽雷雨垂火澤頃刻日月開鴻濛覺來尚憶仙人曲坐教三島生茅屋人世營營無了休枕上片時逰亦足六駿圖周王八馬何為者太宗六駿家天下何人揮灑入毫素逸氣如雲汗流赭天間十二玉花驄西極萬里能呼風拳毛騧子殊可愛九良七跡七騶空的顱漫渡澶溪水騅乎不逝徒為耳天䇿上將善駕馭四方豪傑從龍起人馬相得意氣雄糢糊雲錦驚飛鴻一破黑闥再世充功成逈立明光宫時危草昧或賴此不吝千金就燕市騰黃腰䮍何代無但恐不遇九方爾天生絶足為英雄鹽車鼓車難為功明王有道却走馬駿骨權竒伏櫪下穀貴嘆齊東野老行嘆息枵腹杖黎腳無力忽聞官糶到城中赤手低眉淚沾臆往年斗米數十錢今嵗青蚨百餘翼稚子奔波類鵠形瘦妻伶仃如土色蓽門採摘啖蔬甲中産經營賣首飾大麥未黃小麥青東鄰巳竄西鄰踣三春無雨口嗷嗷百里絶烟心惻惻命危未免委溝壑病起猶來看稼穡菽粟由來價轉髙蠶絲屈指抽未得災疹流行可奈何蒼天胡為至此極幸賴聖明減田租不爾室家盡逃匿有司誰上流民圖征夫徒抱杞人識救荒安得富青州佇望全生活鄉國重七夕行秋空無雲月正明銀河不動波無聲牽牛織女兩相望烏鵲仙橋一道橫相逢共記爭相識天上雙雙罷耕織自憐歡㑹能幾時且喜今年遇重夕西風桂渚生夜凉仙裙玉佩含秋香只恐曉漏驚殘夢莫遣金雞催斷腸柔腸欲綰同心結樂極翻成怨離别怨離别一何苦不見姮娥棲廣寒年年空學霓裳舞前題前月七夕月皎皎人家女郎都乞巧今月七夕更持針仙裙玉佩何嫋嫋借問女郎欲何為前夕乞巧巧還少往嵗織女㑹牽牛烏鵲填河一度逰今年何幸得重㑹新橋突兀風悠悠安得年年閏七月束薪載詠多綢繆海濵老翁當此夕憂喜紛紛忽交積所憂世上巧者多所喜女牛聊委曲憂喜疊來無了時爛醉庭前卧松石前題劉澄甫此月此日重七夕銀河炯炯當窗碧牽牛玉軛幸再驤織女金梭喜仍擲秋風裊裊天宇清秋露盈盈桂花白一年一度尚風波兩夕兩情寧間隔世上萬事渺難期漢外雙星㑹豈易兒女階畔羅酒漿烏鵲橋邊修羽翮前月乞巧巧如何此日乞巧巧須益陳瓜列果復綺筵結綵穿針競瑶席雲幄淹留軾帝車丹霞掩映支機石風雲得㑹或偶然魚水還同轉生隙牛女再遇非等閒上下重交真莫逆夏日山中訪隱士馮裕南山深處栖雲翁茅菴結在懸崖東侵晨攜壺聊一訪青松紫竹來薰風科頭箕踞坐仙石深杯共酌蒼顔紅小橋西邊舞雙鶴海天雨霽拖長虹流水從來厭世事白雲相對談參同雙眼望天發長嘯乍疑杖屨遊崆峒日落遲遲欲歸去疏林月出青山空秋夜金風昨夜過林麓石田黑黍新成熟穫來釀得雲安春中夜鄰家聞清馥海天半月出東嶺却憶髙人在空谷折簡呼童去相邀藜杖迎將深巷曲到來草亭忘主賔試取葛巾聊躑躅連呼五白看飛觴耳熱髙歌自擊筑秋風漠漠呌鴻雁柴門寂寂留麋鹿興來拄杖上南山一覽周天開醉目馬逺枯木寒鴉圖南宋畫師數馬逺閒作枯木寒鴉圖老幹槎牙仍上竦歸羽翩翩時相呼朔風飄搖棲未定寒烟倒挂半有無老懷對此亦冷落南鄰好酒方待沽醉來拂拭方束素更寫鳯凰鳴碧梧寒夜與友人共酌賞瓶梅劉澄甫草閣沉沉燈燼落山雲脉脉雪霰作柴門侵晚苦蕭森石鼎臨窗甘寂寞故人誰為憫貂裘鄰友興來同野酌忘機暖語不知寒折取江梅共酬酢數枝瓊蕊玉壺中漏屋留香光綽約且須細細共流霞但覺馡馡對幽壑梅花與友本無期我謂梅花足三樂雪裏憐渠花似氷燈前顧我髮如鶴五更五㸃罷擊柝一蕊一杯仍大嚼天明客去余就眠近午垂頭夢寥廓春雪東風連夜彤雲起雪片霏霏數千里半消半凍花發遲兩洋滚滚添春水南畝沾濡老農喜履穿愁殺東郭子老夫憂喜總不知醉來獨隱烏皮几前題春風慘惻彤雲翻洛陽清晝卧袁安閉門倣佛聞霡霂穴窗淅瀝窺團欒勾芒偶駕玉龍背屏翳却阻水巖端始疑李萼迸階砌忽訝栁絮飛䦨干紛紛委地消欲盡脉脉隔簾閒自看江妃索寞舞帶緩素娥憔悴歌音慳臺榭霏霏烟半濕鶯花寂寂愁不乾草庭語噤鳥閴絶玉壺影瘦梅雕殘元夕蕭疏少燈火豐年且免無饑寒前題黃卿連朝微溫雲漸密曉時飛雪宵轉劇細數六花半缺全擁巷浮階不勝屐貌童競走玩瑶華白髮田翁獨嘆嘖是時霡霂頗沾濡臘前况已見三白去年已日三尺强上戕百果下損麥𤣥冥成功寂已退萬類正仰三陽澤幸爾流鶯尚不來即為早鴻念羽翮溪南好事蒼江翁冒寒折簡急邀客共賞新林綴莖萼莫待花殷方設席酒酣風起日近晡四望杲杲遙空碧春日山中尋泉馮裕谷風徐來春日閒醉呼童子尋寒泉杖藜穿雲二三里桃花片片浮清漣沿流再行到山麓卓午遂得窮真源清泠一掬濯我纓更洗兩耳祛囂煩泉傍有白石可以當几筵山上有黃鳥可以當管絃一飲三百杯一吟數十篇西嶺日沉羣鳥宿酒空月出方言還過圯上懷張子房彭城城外佳山水黃樓樓下日流峙濁河混混幾時清長橋落落尚名圯每思漢室張子房一代風雲從此起秦鹿持角無定蹤楚猴簮冠何足齒泗上亭長乃真龍麾下將軍盡虎兕邂逅初從運籌䇿道義肯負全終始壯士金鎚博浪沙亞夫玉斗鴻門壘談兵早師黃石公辟穀晚學赤松子明哲保身信有之蕭相韓侯徒爾爾聽阮短歌劉淵甫燕歌楚舞世所羡趙瑟秦筝媚髙宴何處佳人來撥阮衆樂無聲皆驚嘆四絃倣佛琵琶同鳯凰一鳴驚梧桐素影連環抱明月清角往復悲回風楊花飄飄落江渚野禽啾啾雜鶯語胡笳塞外多哀怨江州亭前泣羈旅爭如月下聽鳴琴髙山流水逢知音竹林千載亦竒興草堂一夜清塵心燕臺曲黃卿燕王臺映雲山蒼闔閭晨啓金輝煌清揚一人何時别寶裝躍馬來觀光易水瀲灧西山青春風紫陌繁花明御栁縈烟千萬縷緑窗曉夢聞流鶯窗外睍睆去不留上苑笙簧調歌喉邯鄲舞隊吳娃館錦叠青樓珠帳晚王孫公子擲賥珍鈿案喧喝金杯淺海倭進鷹矯凌空大宛天馬足生風健踠驍臂相追逐名城嘖嘖誰相雄南有鴛鴦北翬鵗梭間宛轉嘆復喜芙蓉紅簇蓮子堅邊霜欲渡沙雁起千古燕臺峻且孤萬峯枕帶滄溟水雲門山絶頂新搆小亭楊應奎雲門髙削金芙蓉晶熒空曠走遊龍何處髙人在空谷乃向危顛結華屋亭亭獨立古石壇長風颯颯動髙寒星辰錯落手可攀玉女夜降錦囊翻自是孤絶可獨往白榆朱草次第長軒棟虛白趂髙巔吐納沆瀣心神爽雲門書屋劉澄甫雲門壁立髙崔嵬劈峯隱隱雙掌開千巖萬壑宗泰岱龍飛鳯舞接蓬萊烟外樹吞大雲寺溪邊橋枕升仙臺一徑窈窕若盤谷馮子幽居饒松竹年少欲勒北山文選竒占勝終南麓不羡王君寶繪堂且營李氏藏書屋案頭螢火乍昏明窗下雞聲遞晨宿白衣卿相如等閒碧山學士媚孤獨晴雲出岫賦歸來夜雨同心歌伐木疑學宫墻過數仭更兼圖史傳心印父子行藏希孔顔兄弟經綸致堯舜聽雪陳經朔風夜度流沙黑海凍雲凝天地塞𤣥冥申令幻氷花滕六回車周八極碎窮屑玉一何輕填谷堙山杳莫測蒼龍泣天竹亂折老鶴呌空松半踣寒聲騷屑屋隙入氷威烈栗重帷逼披裘推窗開凍眼糢糊似入不夜國金輪曉騰三尺髙倐忽送出江山色隂陽慘舒未可窮坐對南榮長太息醉樵歌有美人兮山之曲衣食無營採薪足得錢沽酒醉且歸還向山中伐山木許許一聲天地空青山無人白雲宿山泉精舍馮裕兩山重重泉曲曲髙人傍此結茅屋蓬窗引入清風來白雲常在簷阿宿階前紫竹幾千竿架上牙籖三萬軸淵明黍熟多釀酒陶然一醉東籬菊閭山老翁日相過擊節酣歌振崖谷前題劉澄甫平生愛山復愛泉嵗晚方謀海岱田三徑旋開著茅宇百畝自為終天年屋上清風烟漠漠階前流水響濺濺雨來樹杪嵐光出雲過溪頭秀色連衡門麋鹿忽驚犬草席沙鷗却避鸇把酒吟詩索島嶼解衣延客醉花筵采芝萬仭冥鴻逝濯足深潭抱石眠軒窗面面翠欲墮池沼涓涓清可憐樵客劇談暫弛擔漁翁獨立亦忘筌輞川素壁見圖畫桃源側洞生風烟北山移文任譏誚東䝉泉石豫老焉九日來山文㑹來山亭子苔徑斜野翁攜杖看黃花塞鴻嗷嗷向南去日光淡淡浮雲遮主人清酒滿百壺羽觴來往飛流霞對酒賦詩發髙興長箋矯矯橫龍蛇倒著葛巾籬畔舞便是柴桑處士家前題劉澄甫指㸃青山何處來松篁迤邐雲門開髙人愛此結茅屋重陽攜榼相追陪黃花萬朵幽澗下白鳥一聲曲水隈把酒臨流成心賞西嶺日暮猶徘徊短髮緼袍風落帽鴻雁忽送牛山哀佳辰良㑹不可斷深杯過罰無嫌猜俯仰古今俱陳迹樂逰戲馬荒莓苔九日對雨歌馮裕秋來日日望重陽重陽正遇風雨狂欲登雲門川無梁欲登堯山隔兩洋山翁何處消愁腸蓑笠且訪山泉莊清風逼人轉覺凉菊花欹斜片片黃風飄滴滴來清香東籬共對飛霞觴昨夜階下聞鳴螿今朝秋光遍八荒漉酒髙歌興初狂利名視之如粃糠餐英飲露聊徜徉恍如屈子逰瀟湘馬逺孤舟秋泛圖澠谷堂中開玉壺髙懸馬逺秋風圖孤舟才放楓葉落魚龍寂寞蒼峰孤隨風放入五湖裏天水茫茫兩相似舉杯痛飲向青天今日才知范蠡是巢山行聞有髙人慕巢父輒向深山結茅宇西南茅茨八九間父子相將避風雨坐話重𤣥無古今欲說典墳非訓詁春來聽鳴禽橋邊倚髙樹夏日枕清流秋成多餘黍冬看寒雪白滿山修竹寒梅對清酤四時相代樂無涯不羡人間簮與組我今特作巢山行憑誰寄與勞山主前題劉澄甫平生喜讀山居賦未老投閒入烟霧户外新栽五粒松岩前舊種三株樹破屋羣峯翠復連野籬亂水青相護山人何事獨愛山環堵風雨身自閒芳草連天迷石榻白雲滿地封柴關漁樵路近時逢語虎豹叢深未可攀升髙選勝欣卜築植栁移花看馥郁燕雀相賀繡幕安鷦鷯却笑卑枝足迤邐王維在輞川回旋李願歸盤谷每思富貴履危機爭若巢山常掩扉酒學淵明多種秫菜倣夷齊自採薇百年回首眼中少是非榮辱將同歸郊園新雨移竹行楊應奎郊園四月新雨足萬木崢嶸惟缺竹殷勤移植雨三竿便覺翛然逺塵俗棲鸞鳴鳯未敢希拂石掃壇還可掬眼看捲地飄龍鱗㑹見參天倚寒玉朱簾掩映留風聲綺疏參差穿月窟同與七賢結伴逰追憶二妃懷湘瀆植杖恐作葛陂龍釣璜難得渭水宿稍雲無葆緑隂濃笋穿節比在倐忽此中夷猶適真態藜藿充腸貧不蹙莫嘆人間有大嚼得此輕彼過食肉夏中雨後適郊外莊劉澄甫長夏炎天氣鬱蒸火雲酷烈烟光凝脫帽披襟遵茂樹園蔬自摘儲層氷農人望雨如望赦終日甘霖似傾㵼池邊幸爾廕松篁郭外欣然看禾稼攜杖閒來尋白鷗肩輿偶出問丹丘溪流活活添新沼杞栁藂藂生小洲柴門夜靜眠鳬鴨甕牖朝凉動紈箑壺醑初分味頗佳野翁對酌情偏洽溽暑可奈暫盤桓幽棲得慣輸平安茅齊五月豈覺熱此身百嵗輕無官圖書插架髙連屋欲賦歸田種新菊郊原日日遂逰課一枕羲皇老空谷海岱㑹集卷五
